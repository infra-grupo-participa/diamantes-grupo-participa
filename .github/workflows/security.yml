name: Security Scan

on:
  workflow_dispatch:

jobs:
  gitleaks-full:
    name: Gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Gitleaks full scan
        run: gitleaks detect --source . --no-banner --redact --verbose

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Audit
        # --audit-level=high falha apenas em high/critical.
        # Ajuste para 'moderate' se quiser mais rigor.
        run: npm audit --audit-level=high

  composer-audit:
    name: composer audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Install deps
        run: composer install --no-interaction --prefer-dist

      - name: Audit
        run: composer audit

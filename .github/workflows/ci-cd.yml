name: CI / CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'tmp/**'
      - 'tests/**'
      - '*.md'
      - '.quality-baseline.json'
      - '.quality-history.json'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do deploy manual'
        required: false
        default: 'deploy manual'

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  pull-requests: write

env:
  TARGET_URL: 'https://diamantes.grupoparticipa.app.br/'

defaults:
  run:
    shell: bash

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Quality Gate (PR + push main)
  # ─────────────────────────────────────────────────────────────
  quality:
    name: Quality Gate
    runs-on: [self-hosted, windows-self-hosted]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: npm ci || npm install

      - name: Run quality check
        run: npm run quality

      - name: Compare against baseline
        id: compare
        run: npm run quality:compare
        continue-on-error: true

      - name: Generate PR comment
        if: always()
        run: npm run quality:pr-comment

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-${{ github.run_id }}
          path: |
            .quality/quality-report.html
            .quality/quality-report.json
            .quality/comparison.json
            .quality/jscpd/

      - name: Post sticky comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: quality-gate
          path: .quality/pr-comment.md

      - name: Job summary
        if: always()
        run: cat .quality/pr-comment.md >> $GITHUB_STEP_SUMMARY || true

      - name: Update baseline if improved (push main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run quality:update-baseline
          if git diff --quiet .quality-baseline.json .quality-history.json; then
            echo "Baseline inalterada."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .quality-baseline.json .quality-history.json
          git commit -m "chore(quality): atualiza baseline (melhoria de métrica)"
          git push

      - name: Fail if gate regressed
        if: steps.compare.outcome == 'failure'
        run: |
          echo "::error::Quality gate falhou — métricas regrediram além da margem."
          exit 1

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Deploy (push main + manual; aguarda quality)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy — Produção
    needs: quality
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, windows-self-hosted]
    environment:
      name: production
      url: https://diamantes.grupoparticipa.app.br
    # Deploy em fila serial — nunca cancela um anterior em curso
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          HOSTINGER_FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          HOSTINGER_FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          GP_CLICKUP_API_KEY: ${{ secrets.GP_CLICKUP_API_KEY }}
          GP_CLICKUP_WEBHOOK_SECRET: ${{ secrets.GP_CLICKUP_WEBHOOK_SECRET }}
          GP_HOTMART_WEBHOOK_SECRET: ${{ secrets.GP_HOTMART_WEBHOOK_SECRET }}
          GP_SUPABASE_URL: ${{ secrets.GP_SUPABASE_URL }}
          GP_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.GP_SUPABASE_SERVICE_ROLE_KEY }}
          GP_SUPABASE_ANON_KEY: ${{ secrets.GP_SUPABASE_ANON_KEY }}
        run: |
          missing=()
          for v in HOSTINGER_FTP_HOST HOSTINGER_FTP_USER HOSTINGER_FTP_PASSWORD \
                   GP_CLICKUP_API_KEY GP_CLICKUP_WEBHOOK_SECRET GP_HOTMART_WEBHOOK_SECRET \
                   GP_SUPABASE_URL GP_SUPABASE_SERVICE_ROLE_KEY GP_SUPABASE_ANON_KEY; do
            [ -z "${!v}" ] && missing+=("$v")
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Secrets ausentes: ${missing[*]}"
            exit 1
          fi
          echo "Todos os secrets presentes."

      - name: Check deploy pause flag
        env:
          GP_DEPLOY_PAUSED: ${{ secrets.GP_DEPLOY_PAUSED }}
        run: |
          if [ "${GP_DEPLOY_PAUSED}" = "true" ]; then
            echo "::warning::Deploy pausado via GP_DEPLOY_PAUSED=true."
            exit 1
          fi

      - name: Assemble deploy artifact
        env:
          GP_CLICKUP_API_KEY: ${{ secrets.GP_CLICKUP_API_KEY }}
          GP_CLICKUP_WEBHOOK_SECRET: ${{ secrets.GP_CLICKUP_WEBHOOK_SECRET }}
          GP_HOTMART_WEBHOOK_SECRET: ${{ secrets.GP_HOTMART_WEBHOOK_SECRET }}
          GP_SUPABASE_URL: ${{ secrets.GP_SUPABASE_URL }}
          GP_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.GP_SUPABASE_SERVICE_ROLE_KEY }}
          GP_SUPABASE_ANON_KEY: ${{ secrets.GP_SUPABASE_ANON_KEY }}
          GP_SHEETS_SYNC_URL: ${{ secrets.GP_SHEETS_SYNC_URL }}
          GP_SHEETS_SYNC_SECRET: ${{ secrets.GP_SHEETS_SYNC_SECRET }}
          GP_MAIL_FROM_EMAIL: 'infra@advmais.com'
          GP_MAIL_FROM_NAME: 'Grupo Participa'
        run: |
          set -e
          DEST="deploy-artifact"
          rm -rf "$DEST"
          mkdir -p "$DEST"

          shopt -s dotglob
          for entry in *; do
            [ "$entry" = "$DEST" ] || [ "$entry" = ".git" ] || [ "$entry" = "node_modules" ] && continue
            cp -r "$entry" "$DEST/"
          done
          shopt -u dotglob

          if [ -f .deployignore ]; then
            while IFS= read -r pattern || [ -n "$pattern" ]; do
              [[ -z "$pattern" || "$pattern" == \#* ]] && continue
              clean="${pattern%/}"
              find "$DEST" -path "$DEST/$clean" -exec rm -rf {} + 2>/dev/null || true
            done < .deployignore
          fi

          cat > "$DEST/.htaccess" <<EOF
          # Auto-generated by ci-cd.yml — DO NOT edit on server.
          SetEnv GP_CLICKUP_API_KEY "${GP_CLICKUP_API_KEY}"
          SetEnv GP_CLICKUP_WEBHOOK_SECRET "${GP_CLICKUP_WEBHOOK_SECRET}"
          SetEnv GP_HOTMART_WEBHOOK_SECRET "${GP_HOTMART_WEBHOOK_SECRET}"
          SetEnv GP_SUPABASE_URL "${GP_SUPABASE_URL}"
          SetEnv GP_SUPABASE_SERVICE_ROLE_KEY "${GP_SUPABASE_SERVICE_ROLE_KEY}"
          SetEnv GP_SUPABASE_ANON_KEY "${GP_SUPABASE_ANON_KEY}"
          SetEnv GP_SUPABASE_SCHEMA "portal"
          SetEnv GP_STORAGE_DRIVER "json"
          SetEnv GP_PORTALS_SOURCE "json"
          SetEnv GP_APP_BASE_URL "https://diamantes.grupoparticipa.app.br"
          SetEnv GP_MAIL_FROM_EMAIL "${GP_MAIL_FROM_EMAIL}"
          SetEnv GP_MAIL_FROM_NAME "${GP_MAIL_FROM_NAME}"
          SetEnv GP_COOKIE_SECURE "true"
          ${GP_SHEETS_SYNC_URL:+SetEnv GP_SHEETS_SYNC_URL "${GP_SHEETS_SYNC_URL}"}
          ${GP_SHEETS_SYNC_SECRET:+SetEnv GP_SHEETS_SYNC_SECRET "${GP_SHEETS_SYNC_SECRET}"}

          Options -Indexes
          DirectoryIndex index.html

          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteBase /

              RewriteRule ^\$ index.html [L]

              RewriteCond %{REQUEST_URI} !^/(api|admin|assets|portal|tests|docs|tmp)(/|\$)
              RewriteRule ^([a-z][a-z0-9-]+)/?\$ portal/dashboard.html?slug=\$1 [L,R=302]
          </IfModule>

          <FilesMatch "^(\.htaccess|\.htpasswd|\.DS_Store|php\.ini|.*\.example|.*\.md)\$">
              Require all denied
          </FilesMatch>
          <FilesMatch "\.(env|log|sqlite3?|jsonl)\$">
              Require all denied
          </FilesMatch>
          <FilesMatch "\.json\$">
              Require all denied
          </FilesMatch>

          <IfModule mod_expires.c>
              ExpiresActive On
              ExpiresByType image/webp "access plus 7 days"
              ExpiresByType image/jpeg "access plus 7 days"
              ExpiresByType image/png "access plus 7 days"
              ExpiresByType text/css "access plus 1 day"
              ExpiresByType application/javascript "access plus 1 day"
          </IfModule>

          <IfModule mod_headers.c>
              Header set X-Content-Type-Options "nosniff"
              Header set X-Frame-Options "SAMEORIGIN"
              Header set Referrer-Policy "strict-origin-when-cross-origin"
              Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
              Header always set Permissions-Policy "geolocation=(), camera=(), microphone=()"
              Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.clickup.com https://*.supabase.co; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
          </IfModule>
          EOF

          echo "=== Artifact pronto ==="
          ls -la "$DEST/" | head -30

      - name: Detectar raiz real do FTP
        id: ftp-root
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          set -e
          CREDS="${FTP_USER}:${FTP_PASS}"
          echo "=== Listagem raiz FTP ==="
          ROOT_LISTING=$(curl -sS --user "$CREDS" "ftp://${FTP_HOST}/" --max-time 30 || true)
          echo "$ROOT_LISTING"
          if echo "$ROOT_LISTING" | grep -q "public_html"; then
            FTP_ROOT="public_html/"
          else
            FTP_ROOT=""
          fi
          echo "FTP_ROOT detectado: '${FTP_ROOT}'"
          echo "ftp_root=${FTP_ROOT}" >> "$GITHUB_OUTPUT"

      - name: Upload via curl FTP
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          FTP_ROOT: ${{ steps.ftp-root.outputs.ftp_root }}
        run: |
          set -e
          CREDS="${FTP_USER}:${FTP_PASS}"
          cd deploy-artifact

          echo "=== Upload em FTP_ROOT='${FTP_ROOT}' ==="
          UPLOADED=0; SKIPPED=0; FAILED=0

          while IFS= read -r f; do
            rel="${f#./}"
            # Pula arquivos de runtime e controle que não vão para prod
            case "$rel" in
              api/storage/app-state.json|api/storage/audit-log.jsonl) SKIPPED=$((SKIPPED+1)); continue ;;
              api/storage/notification-log.jsonl|api/storage/notification-markers/*) SKIPPED=$((SKIPPED+1)); continue ;;
              api/storage/rate-limits.json|api/data/clickup-api-key.txt) SKIPPED=$((SKIPPED+1)); continue ;;
            esac

            rel_enc=$(printf '%s' "$rel" | sed 's/ /%20/g')
            target="ftp://${FTP_HOST}/${FTP_ROOT}${rel_enc}"
            code=$(curl -sS --ftp-create-dirs --user "$CREDS" \
                   -T "$f" "$target" \
                   -w "%{http_code}" -o /dev/null --max-time 60 \
                   || echo "ERR")
            if [ "$code" = "226" ] || [ "$code" = "0" ] || [ "$code" = "" ]; then
              UPLOADED=$((UPLOADED+1))
            else
              echo "::warning::Upload falhou ($code): $rel"
              FAILED=$((FAILED+1))
            fi
          done < <(find . -type f)

          echo ""
          echo "Uploaded: $UPLOADED  Skipped: $SKIPPED  Failed: $FAILED"
          [ $FAILED -eq 0 ] || { echo "::error::$FAILED upload(s) falharam"; exit 1; }

      - name: Verificar destino final no FTP
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          FTP_ROOT: ${{ steps.ftp-root.outputs.ftp_root }}
        run: |
          CREDS="${FTP_USER}:${FTP_PASS}"
          echo "=== Conteúdo final de /${FTP_ROOT} ==="
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}/${FTP_ROOT}" --max-time 30 || true
          if [ "$FTP_ROOT" = "public_html/" ]; then
            INNER=$(curl -sS --user "$CREDS" "ftp://${FTP_HOST}/${FTP_ROOT}" | grep -c "public_html" || true)
            if [ "$INNER" -gt 0 ]; then
              echo "::error::public_html/ duplicado detectado — bug de path!"
              exit 1
            fi
          fi

      - name: Smoke — login page
        run: |
          set -e
          sleep 5
          STATUS=$(curl -s -o /tmp/login.html -w "%{http_code}" "${TARGET_URL}")
          echo "Login page: $STATUS"
          [ "$STATUS" = "200" ] || { echo "::error::Login retornou $STATUS"; exit 1; }
          grep -q "supabase.min.js" /tmp/login.html && echo "OK supabase-js" || echo "::warning::supabase-js ausente"

      - name: Smoke — clickup-webhook
        run: |
          set -e
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${TARGET_URL}api/clickup-webhook.php")
          echo "ClickUp webhook: $STATUS"
          [[ "$STATUS" != 5* ]] || { echo "::error::Webhook ClickUp retornou $STATUS"; exit 1; }

      - name: Smoke — hotmart-webhook
        run: |
          set -e
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${TARGET_URL}api/hotmart-webhook.php")
          echo "Hotmart webhook: $STATUS"
          [[ "$STATUS" != 5* ]] || { echo "::error::Webhook Hotmart retornou $STATUS"; exit 1; }

      - name: Notify success
        if: success()
        run: |
          echo "Deploy concluído: ${TARGET_URL}"
          echo "Commit: ${{ github.sha }}"

name: Deploy — Homologação

on:
  push:
    branches: [homologacao]
    paths-ignore:
      - 'docs/**'
      - 'tmp/**'
      - 'tests/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do deploy manual'
        required: false
        default: 'deploy manual homolog'

# Deploy NUNCA cancela um anterior em curso
concurrency:
  group: deploy-homolog
  cancel-in-progress: false

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '20'
  TARGET_URL: 'https://homolog.diamantes.grupoparticipa.app.br/api/health.php'
  BASE_URL: 'https://homolog.diamantes.grupoparticipa.app.br'

jobs:
  # ──────────────────────────────────────────────
  # 0. Validar que todas as secrets obrigatórias
  #    estão definidas antes de gastar tempo buildando
  # ──────────────────────────────────────────────
  validate-secrets:
    name: Validate required secrets (homolog)
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          missing=()
          for v in \
            HOSTINGER_HOMOLOG_FTP_HOST \
            HOSTINGER_HOMOLOG_FTP_USER \
            HOSTINGER_HOMOLOG_FTP_PASSWORD \
            HOSTINGER_HOMOLOG_FTP_PATH \
            GP_CLICKUP_API_KEY \
            GP_CLICKUP_WEBHOOK_SECRET \
            GP_SUPABASE_URL \
            GP_SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets (homolog): ${missing[*]}"
            echo ""
            echo "Cadastre as secrets em:"
            echo "  GitHub → Settings → Secrets and variables → Actions → New repository secret"
            echo ""
            echo "Consulte docs/deploy.md para instruções completas."
            exit 1
          fi
          echo "All required secrets (homolog) are present."
        env:
          HOSTINGER_HOMOLOG_FTP_HOST: ${{ secrets.HOSTINGER_HOMOLOG_FTP_HOST }}
          HOSTINGER_HOMOLOG_FTP_USER: ${{ secrets.HOSTINGER_HOMOLOG_FTP_USER }}
          HOSTINGER_HOMOLOG_FTP_PASSWORD: ${{ secrets.HOSTINGER_HOMOLOG_FTP_PASSWORD }}
          HOSTINGER_HOMOLOG_FTP_PATH: ${{ secrets.HOSTINGER_HOMOLOG_FTP_PATH }}
          GP_CLICKUP_API_KEY: ${{ secrets.GP_CLICKUP_API_KEY }}
          GP_CLICKUP_WEBHOOK_SECRET: ${{ secrets.GP_CLICKUP_WEBHOOK_SECRET }}
          GP_SUPABASE_URL: ${{ secrets.GP_SUPABASE_URL }}
          GP_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.GP_SUPABASE_SERVICE_ROLE_KEY }}

  # ──────────────────────────────────────────────
  # 1. Build — instala deps prod e gera artifact
  # ──────────────────────────────────────────────
  build:
    name: Build (prod deps)
    runs-on: ubuntu-latest
    needs: validate-secrets
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-prod-${{ hashFiles('composer.lock') }}
          restore-keys: composer-prod-

      - name: Composer install (no-dev)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: npm ci (prod)
        run: npm ci --omit=dev

      - name: Assemble deploy artifact
        env:
          GP_CLICKUP_API_KEY: ${{ secrets.GP_CLICKUP_API_KEY }}
          GP_CLICKUP_WEBHOOK_SECRET: ${{ secrets.GP_CLICKUP_WEBHOOK_SECRET }}
          GP_SUPABASE_URL: ${{ secrets.GP_SUPABASE_URL }}
          GP_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.GP_SUPABASE_SERVICE_ROLE_KEY }}
          GP_SHEETS_SYNC_URL: ${{ secrets.GP_SHEETS_SYNC_URL }}
          GP_SHEETS_SYNC_SECRET: ${{ secrets.GP_SHEETS_SYNC_SECRET }}
          GP_MAIL_FROM_EMAIL: 'infra@advmais.com'
          GP_MAIL_FROM_NAME: 'Grupo Participa (Homolog)'
        run: |
          set -e

          DEST="deploy-artifact"
          mkdir -p "$DEST"

          # Copia tudo primeiro
          rsync -a --exclude="$DEST" . "$DEST/"

          # Remove o que não vai pra Hostinger (lê .deployignore)
          while IFS= read -r pattern || [ -n "$pattern" ]; do
            [[ -z "$pattern" || "$pattern" == \#* ]] && continue
            clean="${pattern%/}"
            find "$DEST" -path "$DEST/$clean" -exec rm -rf {} + 2>/dev/null || true
          done < .deployignore

          # Inject SetEnv directives no topo do .htaccess do artifact (env vars do Apache)
          # Sem isso, getenv() no PHP retorna vazio em produção shared hosting.
          cat > "$DEST/.htaccess.envblock" <<EOF
          # Auto-generated by deploy-homolog.yml — DO NOT edit on server
          SetEnv GP_CLICKUP_API_KEY "${GP_CLICKUP_API_KEY}"
          SetEnv GP_CLICKUP_WEBHOOK_SECRET "${GP_CLICKUP_WEBHOOK_SECRET}"
          SetEnv GP_SUPABASE_URL "${GP_SUPABASE_URL}"
          SetEnv GP_SUPABASE_SERVICE_ROLE_KEY "${GP_SUPABASE_SERVICE_ROLE_KEY}"
          SetEnv GP_SUPABASE_SCHEMA "portal"
          SetEnv GP_STORAGE_DRIVER "json"
          SetEnv GP_PORTALS_SOURCE "json"
          SetEnv GP_APP_BASE_URL "https://homologacao.diamantes.grupoparticipa.app.br"
          SetEnv GP_MAIL_FROM_EMAIL "${GP_MAIL_FROM_EMAIL}"
          SetEnv GP_MAIL_FROM_NAME "${GP_MAIL_FROM_NAME}"
          SetEnv GP_COOKIE_SECURE "true"
          ${GP_SHEETS_SYNC_URL:+SetEnv GP_SHEETS_SYNC_URL "${GP_SHEETS_SYNC_URL}"}
          ${GP_SHEETS_SYNC_SECRET:+SetEnv GP_SHEETS_SYNC_SECRET "${GP_SHEETS_SYNC_SECRET}"}
          EOF
          # Prepend ao .htaccess principal
          cat "$DEST/.htaccess.envblock" "$DEST/.htaccess" > "$DEST/.htaccess.new"
          mv "$DEST/.htaccess.new" "$DEST/.htaccess"
          rm -f "$DEST/.htaccess.envblock"
          echo "===.htaccess head==="
          head -20 "$DEST/.htaccess" | sed -E 's/(SetEnv [A-Z_]+) "[^"]+"/\1 "***"/'

          echo ""
          echo "Artifact contents (top level):"
          ls -la "$DEST/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-artifact-homolog
          path: deploy-artifact/
          retention-days: 3
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # 2. Deploy — envia artifact via FTP
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy via FTP (homolog)
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: homologacao
      url: https://homolog.diamantes.grupoparticipa.app.br
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-artifact-homolog
          path: deploy-artifact/

      - name: Check deploy pause flag
        run: |
          if [ "${GP_DEPLOY_PAUSED}" = "true" ]; then
            echo "::warning::Deploy pausado via secret GP_DEPLOY_PAUSED=true."
            echo "Para retomar: remova ou mude o valor da secret no GitHub."
            exit 1
          fi
        env:
          GP_DEPLOY_PAUSED: ${{ secrets.GP_DEPLOY_PAUSED }}

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via lftp (preserve runtime files)
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_HOMOLOG_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_HOMOLOG_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_HOMOLOG_FTP_PASSWORD }}
          FTP_PATH: ${{ secrets.HOSTINGER_HOMOLOG_FTP_PATH }}
        run: |
          lftp -c "
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 10;
            set ftp:ssl-allow no;
            set ftp:passive-mode yes;
            open -u '$FTP_USER','$FTP_PASS' ftp://$FTP_HOST;
            mirror -R --only-newer --verbose --parallel=3 \
              --exclude-glob '.git*' \
              --exclude-glob 'node_modules/' \
              --exclude-glob 'tests/' \
              --exclude-glob 'docs/' \
              --exclude-glob 'tmp/' \
              --exclude-glob '.github/' \
              --exclude-glob 'api/storage/app-state.json' \
              --exclude-glob 'api/storage/audit-log.jsonl' \
              --exclude-glob 'api/storage/notification-log.jsonl' \
              --exclude-glob 'api/storage/notification-markers/' \
              --exclude-glob 'api/storage/rate-limits.json' \
              --exclude-glob 'api/data/clickup-api-key.txt' \
              ./deploy-artifact/ '$FTP_PATH';
            bye
          "

  # ──────────────────────────────────────────────
  # 3. Smoke test — valida que o servidor respondeu
  # ──────────────────────────────────────────────
  smoke:
    name: Smoke test (homolog)
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for server to settle
        run: sleep 10

      - name: Smoke — health endpoint
        run: |
          set -euo pipefail
          HTTP_STATUS=$(curl -s -o /tmp/health.json -w "%{http_code}" "${{ env.TARGET_URL }}")
          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/health.json
          echo ""
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "503" ]; then
            echo "::error::Health endpoint retornou $HTTP_STATUS"
            exit 1
          fi

      - name: Smoke — login + CSRF
        run: |
          set -euo pipefail
          for path in "/" "/api/csrf.php"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.BASE_URL }}${path}")
            if [ "$STATUS" != "200" ]; then
              echo "::error::${path} retornou $STATUS"; exit 1
            fi
            echo "OK: ${path} -> $STATUS"
          done

      - name: Notify success
        if: success()
        run: |
          echo "Deploy para homologacao concluido com sucesso."
          echo "URL: https://homolog.diamantes.grupoparticipa.app.br"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"

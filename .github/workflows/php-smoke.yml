name: PHP Smoke Tests

# Quality gate via PR — após rewrite Supabase stack, backend reduzido a 2 endpoints:
#   api/clickup.php (proxy, valida JWT supabase)
#   api/clickup-webhook.php (HMAC validation)
# Auth/users/portal agora são client-side (supabase-js + RLS).

on:
  workflow_dispatch:

jobs:
  smoke:
    name: PHP lint + smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json, mbstring, openssl
          tools: none
          coverage: none

      - name: Lint PHP (api/)
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            php -l "$file"
          done < <(find api -name '*.php' -type f | sort)

      - name: Start local PHP server
        env:
          GP_CLICKUP_API_KEY: dummy_for_smoke_only
          GP_CLICKUP_WEBHOOK_SECRET: dummy_secret_for_smoke
          GP_SUPABASE_URL: https://npqyvjhvtfahuxfmuhie.supabase.co
          GP_SUPABASE_ANON_KEY: dummy_anon_for_smoke
        run: |
          php -S 127.0.0.1:8765 > /tmp/php-server.log 2>&1 &
          echo $! > /tmp/php-server.pid
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8765/ >/dev/null 2>&1; then
              echo "Server up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "Server did not respond in 20s. Log:"
          cat /tmp/php-server.log
          exit 1

      - name: Smoke checks
        run: |
          set -euo pipefail

          assert_status() {
            local method="$1" url="$2" expected="$3" body="${4:-}"
            local code
            if [ -n "$body" ]; then
              code=$(curl -s -o /tmp/resp.txt -w '%{http_code}' -X "$method" -H 'Content-Type: application/json' --data "$body" "$url" || true)
            else
              code=$(curl -s -o /tmp/resp.txt -w '%{http_code}' -X "$method" "$url" || true)
            fi
            if [ "$code" != "$expected" ]; then
              echo "FAIL: $method $url returned $code (expected $expected)"
              cat /tmp/resp.txt; echo ""; exit 1
            fi
            echo "OK: $method $url -> $code"
          }

          # 1. Login page renders (HTML estático)
          assert_status GET  http://127.0.0.1:8765/                      200

          # 2. Portal HTML estático renderiza (auth é client-side)
          assert_status GET  http://127.0.0.1:8765/portal/                200

          # 3. Admin HTML estático renderiza (auth é client-side)
          assert_status GET  http://127.0.0.1:8765/admin/                 200

          # 4. ClickUp proxy sem JWT → 401
          assert_status POST http://127.0.0.1:8765/api/clickup.php        401 '{"method":"GET","path":"task/x"}'

          # 5. ClickUp proxy com JWT bogus → 401 (Supabase rejeita)
          code=$(curl -s -o /tmp/resp.txt -w '%{http_code}' -X POST -H 'Authorization: Bearer fake.fake.fake' -H 'Content-Type: application/json' --data '{}' http://127.0.0.1:8765/api/clickup.php || true)
          if [ "$code" != "401" ]; then echo "FAIL: clickup.php with bogus JWT returned $code"; cat /tmp/resp.txt; exit 1; fi
          echo "OK: clickup.php bogus JWT -> 401"

          # 6. Webhook ClickUp sem signature válida → 401
          assert_status POST http://127.0.0.1:8765/api/clickup-webhook.php 401 '{"event":"test"}'

          echo ""
          echo "All smoke checks passed."

      - name: Stop server
        if: always()
        run: |
          [ -f /tmp/php-server.pid ] && kill "$(cat /tmp/php-server.pid)" 2>/dev/null || true
          [ -f /tmp/php-server.log ] && { echo "===PHP server log==="; cat /tmp/php-server.log; }

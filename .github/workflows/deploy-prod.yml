name: Deploy — Produção

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'tmp/**'
      - 'tests/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do deploy manual'
        required: false
        default: 'deploy manual'

# Deploy NUNCA cancela um anterior em curso — fila serial
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '20'
  TARGET_URL: 'https://diamantes.grupoparticipa.app.br/servico/api/health.php'

jobs:
  # ──────────────────────────────────────────────
  # 0. Validar que todas as secrets obrigatórias
  #    estão definidas antes de gastar tempo buildando
  # ──────────────────────────────────────────────
  validate-secrets:
    name: Validate required secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          missing=()
          for v in \
            HOSTINGER_FTP_HOST \
            HOSTINGER_FTP_USER \
            HOSTINGER_FTP_PASSWORD \
            HOSTINGER_FTP_PATH \
            GP_CLICKUP_API_KEY \
            GP_CLICKUP_WEBHOOK_SECRET \
            GP_SUPABASE_URL \
            GP_SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo ""
            echo "Cadastre as secrets em:"
            echo "  GitHub → Settings → Secrets and variables → Actions → New repository secret"
            echo ""
            echo "Consulte docs/deploy.md para instruções completas."
            exit 1
          fi
          echo "All required secrets are present."
        env:
          HOSTINGER_FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          HOSTINGER_FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_FTP_PATH: ${{ secrets.HOSTINGER_FTP_PATH }}
          GP_CLICKUP_API_KEY: ${{ secrets.GP_CLICKUP_API_KEY }}
          GP_CLICKUP_WEBHOOK_SECRET: ${{ secrets.GP_CLICKUP_WEBHOOK_SECRET }}
          GP_SUPABASE_URL: ${{ secrets.GP_SUPABASE_URL }}
          GP_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.GP_SUPABASE_SERVICE_ROLE_KEY }}

  # ──────────────────────────────────────────────
  # 1. Build — instala deps prod e gera artifact
  # ──────────────────────────────────────────────
  build:
    name: Build (prod deps)
    runs-on: ubuntu-latest
    needs: validate-secrets
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-prod-${{ hashFiles('composer.lock') }}
          restore-keys: composer-prod-

      - name: Composer install (no-dev)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: npm ci (prod)
        run: npm ci --omit=dev

      - name: Assemble deploy artifact
        run: |
          set -e

          DEST="deploy-artifact"
          mkdir -p "$DEST"

          # Copia tudo primeiro
          rsync -a --exclude="$DEST" . "$DEST/"

          # Remove o que não vai pra Hostinger (lê .deployignore)
          while IFS= read -r pattern || [ -n "$pattern" ]; do
            # Ignora linhas vazias e comentários
            [[ -z "$pattern" || "$pattern" == \#* ]] && continue
            # Remove trailing slash para compatibilidade com find
            clean="${pattern%/}"
            find "$DEST" -path "$DEST/$clean" -exec rm -rf {} + 2>/dev/null || true
          done < .deployignore

          echo "Artifact contents (top level):"
          ls -la "$DEST/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-artifact-prod
          path: deploy-artifact/
          retention-days: 3
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # 2. Deploy — envia artifact via FTP
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://diamantes.grupoparticipa.app.br
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-artifact-prod
          path: deploy-artifact/

      - name: Check deploy pause flag
        run: |
          if [ "${GP_DEPLOY_PAUSED}" = "true" ]; then
            echo "::warning::Deploy pausado via secret GP_DEPLOY_PAUSED=true."
            echo "Para retomar: remova ou mude o valor da secret no GitHub."
            exit 1
          fi
        env:
          GP_DEPLOY_PAUSED: ${{ secrets.GP_DEPLOY_PAUSED }}

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via lftp (preserve runtime files in api/storage e api/data)
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          FTP_PATH: ${{ secrets.HOSTINGER_FTP_PATH }}
        run: |
          # mirror -R faz upload local→remote
          # --only-newer: só sobe se arquivo local mais novo
          # SEM --delete: arquivos remotos preservados (app-state.json, audit-log.jsonl, etc)
          # exclude: arquivos que nunca devem subir nem ser deletados remotamente
          lftp -c "
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 10;
            set ftp:ssl-allow no;
            set ftp:passive-mode yes;
            open -u '$FTP_USER','$FTP_PASS' ftp://$FTP_HOST;
            mirror -R --only-newer --verbose --parallel=3 \
              --exclude-glob '.git*' \
              --exclude-glob 'node_modules/' \
              --exclude-glob 'tests/' \
              --exclude-glob 'docs/' \
              --exclude-glob 'tmp/' \
              --exclude-glob '.github/' \
              --exclude-glob 'api/storage/app-state.json' \
              --exclude-glob 'api/storage/audit-log.jsonl' \
              --exclude-glob 'api/storage/notification-log.jsonl' \
              --exclude-glob 'api/storage/notification-markers/' \
              --exclude-glob 'api/storage/rate-limits.json' \
              --exclude-glob 'api/data/clickup-api-key.txt' \
              ./deploy-artifact/ '$FTP_PATH';
            bye
          "

  # ──────────────────────────────────────────────
  # 3. Smoke test — valida que o servidor respondeu
  # ──────────────────────────────────────────────
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for server to settle
        run: sleep 10

      - name: Smoke — health endpoint (200 quando tudo ok, 503 quando degraded)
        run: |
          set -euo pipefail
          HTTP_STATUS=$(curl -s -o /tmp/health.json -w "%{http_code}" "${{ env.TARGET_URL }}")
          echo "HTTP status: $HTTP_STATUS"
          echo "Health response:"
          cat /tmp/health.json
          echo ""
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "503" ]; then
            echo "::error::Health endpoint retornou $HTTP_STATUS — servidor possivelmente offline."
            exit 1
          fi
          if [ "$HTTP_STATUS" = "503" ]; then
            echo "::warning::Servidor respondeu mas em modo degraded. Verifique env vars e arquivos críticos."
          fi

      - name: Smoke — login page renders
        run: |
          set -euo pipefail
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://diamantes.grupoparticipa.app.br/servico/")
          if [ "$STATUS" != "200" ]; then
            echo "::error::Login page retornou $STATUS"
            exit 1
          fi
          echo "Login page OK: $STATUS"

      - name: Smoke — CSRF endpoint
        run: |
          set -euo pipefail
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://diamantes.grupoparticipa.app.br/servico/api/csrf.php")
          if [ "$STATUS" != "200" ]; then
            echo "::error::CSRF endpoint retornou $STATUS"
            exit 1
          fi
          echo "CSRF endpoint OK: $STATUS"

      - name: Notify success
        if: success()
        run: |
          echo "Deploy para producao concluido com sucesso."
          echo "URL: https://diamantes.grupoparticipa.app.br"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"

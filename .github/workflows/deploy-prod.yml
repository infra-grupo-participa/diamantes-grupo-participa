name: Deploy — Produção

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'tmp/**'
      - 'tests/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do deploy manual'
        required: false
        default: 'deploy manual'

# Deploy NUNCA cancela um anterior em curso — fila serial
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '20'
  TARGET_URL: 'https://diamantes.grupoparticipa.app.br/servico/'

jobs:
  # ──────────────────────────────────────────────
  # 0. Validar que todas as secrets obrigatórias
  #    estão definidas antes de gastar tempo buildando
  # ──────────────────────────────────────────────
  validate-secrets:
    name: Validate required secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          missing=()
          for v in \
            HOSTINGER_FTP_HOST \
            HOSTINGER_FTP_USER \
            HOSTINGER_FTP_PASSWORD \
            HOSTINGER_FTP_PATH \
            GP_CLICKUP_API_KEY \
            GP_CLICKUP_WEBHOOK_SECRET \
            GP_SUPABASE_URL \
            GP_SUPABASE_SERVICE_ROLE_KEY \
            GP_SUPABASE_ANON_KEY; do
            if [ -z "${!v}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo ""
            echo "Cadastre as secrets em:"
            echo "  GitHub → Settings → Secrets and variables → Actions → New repository secret"
            echo ""
            echo "Consulte docs/deploy.md para instruções completas."
            exit 1
          fi
          echo "All required secrets are present."
        env:
          HOSTINGER_FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          HOSTINGER_FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_FTP_PATH: ${{ secrets.HOSTINGER_FTP_PATH }}
          GP_CLICKUP_API_KEY: ${{ secrets.GP_CLICKUP_API_KEY }}
          GP_CLICKUP_WEBHOOK_SECRET: ${{ secrets.GP_CLICKUP_WEBHOOK_SECRET }}
          GP_SUPABASE_URL: ${{ secrets.GP_SUPABASE_URL }}
          GP_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.GP_SUPABASE_SERVICE_ROLE_KEY }}
          GP_SUPABASE_ANON_KEY: ${{ secrets.GP_SUPABASE_ANON_KEY }}

  # ──────────────────────────────────────────────
  # 1. Build — instala deps prod e gera artifact
  # ──────────────────────────────────────────────
  build:
    name: Build (prod deps)
    runs-on: ubuntu-latest
    needs: validate-secrets
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: npm ci (prod)
        run: npm ci --omit=dev

      - name: Assemble deploy artifact
        env:
          GP_CLICKUP_API_KEY: ${{ secrets.GP_CLICKUP_API_KEY }}
          GP_CLICKUP_WEBHOOK_SECRET: ${{ secrets.GP_CLICKUP_WEBHOOK_SECRET }}
          GP_SUPABASE_URL: ${{ secrets.GP_SUPABASE_URL }}
          GP_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.GP_SUPABASE_SERVICE_ROLE_KEY }}
          GP_SUPABASE_ANON_KEY: ${{ secrets.GP_SUPABASE_ANON_KEY }}
          GP_SHEETS_SYNC_URL: ${{ secrets.GP_SHEETS_SYNC_URL }}
          GP_SHEETS_SYNC_SECRET: ${{ secrets.GP_SHEETS_SYNC_SECRET }}
          GP_MAIL_FROM_EMAIL: 'infra@advmais.com'
          GP_MAIL_FROM_NAME: 'Grupo Participa'
        run: |
          set -e

          DEST="deploy-artifact"
          mkdir -p "$DEST"

          # Copia tudo primeiro
          rsync -a --exclude="$DEST" . "$DEST/"

          # Remove o que não vai pra Hostinger (lê .deployignore)
          while IFS= read -r pattern || [ -n "$pattern" ]; do
            [[ -z "$pattern" || "$pattern" == \#* ]] && continue
            clean="${pattern%/}"
            find "$DEST" -path "$DEST/$clean" -exec rm -rf {} + 2>/dev/null || true
          done < .deployignore

          # CRITICAL: gera .htaccess de produção do zero, com SetEnv + RewriteBase /servico/
          # correto pra subpasta. O .htaccess do repo é só base local — em prod precisa
          # de RewriteBase na subpasta + SetEnv pras env vars do PHP.
          cat > "$DEST/.htaccess" <<EOF
          # Auto-generated by deploy-prod.yml — DO NOT edit on server.
          # SetEnv block: env vars críticas (Apache passa pra getenv()/getenv($_SERVER) no PHP).
          SetEnv GP_CLICKUP_API_KEY "${GP_CLICKUP_API_KEY}"
          SetEnv GP_CLICKUP_WEBHOOK_SECRET "${GP_CLICKUP_WEBHOOK_SECRET}"
          SetEnv GP_SUPABASE_URL "${GP_SUPABASE_URL}"
          SetEnv GP_SUPABASE_SERVICE_ROLE_KEY "${GP_SUPABASE_SERVICE_ROLE_KEY}"
          SetEnv GP_SUPABASE_ANON_KEY "${GP_SUPABASE_ANON_KEY}"
          SetEnv GP_SUPABASE_SCHEMA "portal"
          SetEnv GP_STORAGE_DRIVER "json"
          SetEnv GP_PORTALS_SOURCE "json"
          SetEnv GP_APP_BASE_URL "https://diamantes.grupoparticipa.app.br/servico"
          SetEnv GP_MAIL_FROM_EMAIL "${GP_MAIL_FROM_EMAIL}"
          SetEnv GP_MAIL_FROM_NAME "${GP_MAIL_FROM_NAME}"
          SetEnv GP_COOKIE_SECURE "true"
          ${GP_SHEETS_SYNC_URL:+SetEnv GP_SHEETS_SYNC_URL "${GP_SHEETS_SYNC_URL}"}
          ${GP_SHEETS_SYNC_SECRET:+SetEnv GP_SHEETS_SYNC_SECRET "${GP_SHEETS_SYNC_SECRET}"}

          Options -Indexes
          DirectoryIndex index.html index.php

          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteBase /servico/

              RewriteRule ^\$ index.html [L]

              # Backward-compat: URLs legadas /servico/{slug}/ → /servico/portal/?slug={slug}
              RewriteCond %{REQUEST_URI} !^/servico/(api|admin|assets|portal|chatbot|backend|src|vendor|tests|docs|tmp|infra)(/|\$)
              RewriteRule ^([a-z][a-z0-9-]+)/?\$ portal/?slug=\$1 [L,R=302]
          </IfModule>

          <FilesMatch "^(\.htaccess|\.htpasswd|\.DS_Store|php\.ini|.*\.example|.*\.md)\$">
              Require all denied
          </FilesMatch>
          <FilesMatch "\.(env|log|sqlite3?|jsonl)\$">
              Require all denied
          </FilesMatch>
          <FilesMatch "\.json\$">
              Require all denied
          </FilesMatch>

          <IfModule mod_expires.c>
              ExpiresActive On
              ExpiresByType image/webp "access plus 7 days"
              ExpiresByType image/jpeg "access plus 7 days"
              ExpiresByType image/png "access plus 7 days"
              ExpiresByType text/css "access plus 1 day"
              ExpiresByType application/javascript "access plus 1 day"
          </IfModule>

          <IfModule mod_headers.c>
              Header set X-Content-Type-Options "nosniff"
              Header set X-Frame-Options "SAMEORIGIN"
              Header set Referrer-Policy "strict-origin-when-cross-origin"
              Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
              Header always set Permissions-Policy "geolocation=(), camera=(), microphone=()"
              Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.clickup.com https://*.supabase.co; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
          </IfModule>
          EOF
          echo "===.htaccess gerado (SetEnv mascarados)==="
          head -25 "$DEST/.htaccess" | sed -E 's/(SetEnv [A-Z_]+) "[^"]+"/\1 "***"/'

          echo ""
          echo "Artifact contents (top level):"
          ls -la "$DEST/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-artifact-prod
          path: deploy-artifact/
          retention-days: 3
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # 2. Deploy — envia artifact via FTP
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://diamantes.grupoparticipa.app.br
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-artifact-prod
          path: deploy-artifact/

      - name: Check deploy pause flag
        run: |
          if [ "${GP_DEPLOY_PAUSED}" = "true" ]; then
            echo "::warning::Deploy pausado via secret GP_DEPLOY_PAUSED=true."
            echo "Para retomar: remova ou mude o valor da secret no GitHub."
            exit 1
          fi
        env:
          GP_DEPLOY_PAUSED: ${{ secrets.GP_DEPLOY_PAUSED }}

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via lftp (preserve runtime files in api/storage e api/data)
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          FTP_PATH: ${{ secrets.HOSTINGER_FTP_PATH }}
        run: |
          # mirror -R faz upload local→remote
          # --only-newer: só sobe se arquivo local mais novo
          # SEM --delete: arquivos remotos preservados (app-state.json, audit-log.jsonl, etc)
          # exclude: arquivos que nunca devem subir nem ser deletados remotamente
          # FIX (descoberto no primeiro deploy):
          #  1. set ftp:list-options -a → lista dotfiles (sem isso lftp não detecta .htaccess
          #     local → não transfere → produção fica sem .htaccess gerado pelo build).
          #  2. mirror -a → inclui dotfiles na transferência (mesma razão).
          lftp -c "
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 10;
            set ftp:ssl-allow no;
            set ftp:passive-mode yes;
            set ftp:list-options -a;
            open -u '$FTP_USER','$FTP_PASS' ftp://$FTP_HOST;
            mirror -Ra --only-newer --verbose --parallel=3 \
              --exclude-glob '.git*' \
              --exclude-glob 'node_modules/' \
              --exclude-glob 'tests/' \
              --exclude-glob 'docs/' \
              --exclude-glob 'tmp/' \
              --exclude-glob '.github/' \
              --exclude-glob 'api/storage/app-state.json' \
              --exclude-glob 'api/storage/audit-log.jsonl' \
              --exclude-glob 'api/storage/notification-log.jsonl' \
              --exclude-glob 'api/storage/notification-markers/' \
              --exclude-glob 'api/storage/rate-limits.json' \
              --exclude-glob 'api/data/clickup-api-key.txt' \
              ./deploy-artifact/ '$FTP_PATH';
            bye
          "

  # ──────────────────────────────────────────────
  # 3. Smoke test — valida que o servidor respondeu
  # ──────────────────────────────────────────────
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for server to settle
        run: sleep 10

      - name: Smoke — login page renders (index.html)
        run: |
          set -euo pipefail
          HTTP_STATUS=$(curl -s -o /tmp/login.html -w "%{http_code}" "https://diamantes.grupoparticipa.app.br/servico/")
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Login page retornou $HTTP_STATUS — deploy considerado falho."
            exit 1
          fi
          # Confirma que supabase-js é referenciado (garante que o rewrite chegou)
          if grep -q "supabase.min.js" /tmp/login.html; then
            echo "Login page OK — supabase-js tag presente."
          else
            echo "::warning::Login page não contém supabase.min.js — possível deploy antigo em cache."
          fi

      - name: Smoke — clickup webhook endpoint (DEVE aceitar POST vazio com 400, não 5xx)
        run: |
          set -euo pipefail
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://diamantes.grupoparticipa.app.br/servico/api/clickup-webhook.php")
          echo "Webhook status: $STATUS"
          # 400 (signature missing) ou 200 são OK. 5xx = deploy quebrado.
          if [[ "$STATUS" == 5* ]]; then
            echo "::error::clickup-webhook.php retornou $STATUS — erro no servidor."
            exit 1
          fi
          echo "Webhook endpoint OK: $STATUS"

      - name: Smoke — portal redirect (sem auth deve retornar 200 index.html)
        run: |
          set -euo pipefail
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L \
            "https://diamantes.grupoparticipa.app.br/servico/portal/?slug=anthony-sodre")
          echo "Portal status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Portal page retornou $STATUS"
            exit 1
          fi
          echo "Portal page OK: $STATUS"

      - name: Notify success
        if: success()
        run: |
          echo "Deploy para producao concluido com sucesso."
          echo "URL: https://diamantes.grupoparticipa.app.br"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"

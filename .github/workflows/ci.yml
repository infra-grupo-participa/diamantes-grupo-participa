name: CI

on:
  push:
    branches: [main, homologacao]
  pull_request:
    branches: [main, homologacao]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 1. PHP Lint — verifica sintaxe de todos os .php
  # ──────────────────────────────────────────────
  php-lint:
    name: PHP Lint (8.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: none
          coverage: none

      - name: Run php -l on all .php files
        run: |
          find . -name '*.php' \
            -not -path './vendor/*' \
            -print0 \
          | xargs -0 -n1 php -l
          echo "PHP lint passed."

  # ──────────────────────────────────────────────
  # 2. (PHPUnit removido — backend reduzido a 2 endpoints PHP, sem composer/PSR-4)
  # ──────────────────────────────────────────────

  # ──────────────────────────────────────────────
  # 3. Vitest — testes unitários JS
  # ──────────────────────────────────────────────
  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-coverage
          path: build/coverage-js/
          retention-days: 7

  # ──────────────────────────────────────────────
  # 4. Playwright — smoke E2E
  # ──────────────────────────────────────────────
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP (para webServer do Playwright; só pra clickup.php + clickup-webhook.php)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: none
          coverage: none

      - name: Install npm deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────
  # 5. Gitleaks — detecção de secrets (binário direto, sem action)
  # ──────────────────────────────────────────────
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks scan
        run: gitleaks detect --source . --no-banner --redact --verbose

  # ──────────────────────────────────────────────
  # 6. Dependency Review — só em PRs
  # ──────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      # Dependency Graph must be enabled in repo Settings → Security → Code security and analysis.
      # If disabled, the action below errors with "not supported on this repository". We swallow
      # that with continue-on-error so the PR is not blocked, and surface the status in the summary.
      - name: Dependency Review
        id: dep_review
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Surface result
        run: |
          if [ "${{ steps.dep_review.outcome }}" = "failure" ]; then
            echo "::warning title=Dependency Review unavailable::Enable Dependency Graph in repo Settings → Security to make this check enforceable. The PR is not being blocked."
          fi

name: PR Quality Report

# Após rewrite Supabase: backend mínimo (2 PHPs), sem composer/PHPUnit.
# Métricas focadas em PHP lint + Vitest coverage + diff stats.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-comment:
    name: Post quality metrics comment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2 (lint only)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: none
          coverage: none

      - name: Count PHP lint errors
        id: php_lint
        shell: bash
        run: |
          set +e
          ERRORS=0
          if [ -d api ]; then
            ERRORS=$(find api -name '*.php' -type f -exec php -l {} \; 2>&1 | grep -c '^Parse error' || true)
          fi
          # Strip whitespace/newlines (grep -c em arquivo com vários parse errors retorna multilinha)
          ERRORS=$(echo "$ERRORS" | tr -d '[:space:]')
          [ -z "$ERRORS" ] && ERRORS=0
          echo "errors=${ERRORS}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm deps
        run: npm ci

      - name: Run Vitest with coverage
        id: vitest
        shell: bash
        run: |
          set +e
          npx vitest run --coverage > /dev/null 2>&1
          LINES_HIT=0; LINES_TOTAL=0
          if [ -f build/coverage-js/lcov.info ]; then
            LH=$(grep -c '^DA:[0-9]*,[^0]' build/coverage-js/lcov.info)
            LT=$(grep -c '^DA:' build/coverage-js/lcov.info)
            [ -n "$LH" ] && LINES_HIT=$LH
            [ -n "$LT" ] && LINES_TOTAL=$LT
          fi
          echo "lines_hit=${LINES_HIT}" >> "$GITHUB_OUTPUT"
          echo "lines_total=${LINES_TOTAL}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Compute diff stats
        id: diff
        shell: bash
        run: |
          set +e
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l | tr -d ' ')
          STAT=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD)
          ADDED=$(echo "$STAT" | grep -oP '\d+(?= insertion)')
          REMOVED=$(echo "$STAT" | grep -oP '\d+(?= deletion)')
          [ -z "$FILES" ] && FILES=0
          [ -z "$ADDED" ] && ADDED=0
          [ -z "$REMOVED" ] && REMOVED=0
          echo "files=${FILES}" >> "$GITHUB_OUTPUT"
          echo "added=${ADDED}" >> "$GITHUB_OUTPUT"
          echo "removed=${REMOVED}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Find existing quality comment
        uses: peter-evans/find-comment@v3
        id: find_comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- gp-quality-report -->'

      - name: Create or update quality comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- gp-quality-report -->
            ## Relatório de Qualidade

            | Metric | Value |
            |--------|-------|
            | PHP lint errors | ${{ steps.php_lint.outputs.errors }} |
            | Vitest lines covered | ${{ steps.vitest.outputs.lines_hit }} / ${{ steps.vitest.outputs.lines_total }} |
            | Files changed | ${{ steps.diff.outputs.files }} |
            | Lines added | +${{ steps.diff.outputs.added }} |
            | Lines removed | -${{ steps.diff.outputs.removed }} |

            > Gerado automaticamente. Atualizado a cada push neste PR.

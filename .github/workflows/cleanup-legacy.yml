name: Cleanup legado no FTP (temporário)

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: [self-hosted, windows-self-hosted]
    defaults:
      run:
        shell: bash
    steps:
      - name: Listar legado no FTP
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          CREDS="${FTP_USER}:${FTP_PASS}"
          echo "=== Antes — raiz ==="
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}/" | grep -E "backend|chatbot|calculadora|google-apps-script" || echo "(nenhum legado na raiz)"
          echo ""
          echo "=== Antes — portal/ ==="
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}/portal/"
          echo ""
          echo "=== Antes — admin/ ==="
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}/admin/" | grep -E "app\.html|_legacy"
          echo ""
          echo "=== Antes — assets/js/ ==="
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}/assets/js/" | grep -E "legacy-insights-stub|portal-api"
          echo ""
          echo "=== Antes — api/data/ ==="
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}/api/data/" || echo "(api/data não existe)"

      - name: Apagar arquivos órfãos (DELE/RMD recursivo)
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          set +e
          CREDS="${FTP_USER}:${FTP_PASS}"
          BASE="ftp://${FTP_HOST}"

          # Wipe recursivo, mesmo padrão do wipe-and-redeploy.yml.
          # rel: caminho relativo à raiz do user FTP (já é public_html/),
          #      sem barra inicial e SEM barra final. Ex: "portal/assets/js"
          delete_recursive() {
            local rel="$1"
            local url="${BASE}/${rel}/"
            local listing
            listing=$(curl -sS --user "$CREDS" "$url" 2>/dev/null)
            if [ -z "$listing" ]; then
              echo "    (vazio ou não existe: $rel)"
              return
            fi
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              local perm name
              perm=$(echo "$line" | awk '{print $1}')
              name=$(echo "$line" | awk '{for (i=9; i<=NF; i++) printf "%s%s", $i, (i<NF?" ":"")}')
              [ -z "$name" ] && continue
              [ "$name" = "." ] && continue
              [ "$name" = ".." ] && continue
              local child="${rel}/${name}"
              if [[ "$perm" == d* ]]; then
                delete_recursive "$child"
                echo "  RMD  $child"
                curl -sS --user "$CREDS" "${BASE}/${rel}/" -Q "RMD ${name}" -o /dev/null
              else
                echo "  DELE $child"
                curl -sS --user "$CREDS" "${BASE}/${rel}/" -Q "DELE ${name}" -o /dev/null
              fi
            done <<< "$listing"
          }

          # Arquivos avulsos primeiro (parent CWD + DELE no nome)
          echo "=== Arquivos avulsos ==="
          for entry in \
            "admin|app.html" \
            "portal|template.html" \
            "assets/js|portal-api.js" \
            "assets/js|legacy-insights-stub.js"
          do
            parent="${entry%%|*}"
            name="${entry##*|}"
            echo "  DELE $parent/$name"
            curl -sS --user "$CREDS" "${BASE}/${parent}/" -Q "DELE ${name}" -o /dev/null
          done

          echo ""
          echo "=== Pastas legadas (wipe + RMD) ==="
          for d in "backend" "chatbot" "calculadora do inventario" "google-apps-script" "api/data" "admin/_legacy" "portal/assets/css" "portal/assets/js"; do
            echo "  -> $d"
            delete_recursive "$d"
            # Remove o dir vazio agora
            parent=$(dirname "$d")
            base=$(basename "$d")
            curl -sS --user "$CREDS" "${BASE}/${parent}/" -Q "RMD ${base}" -o /dev/null
          done
          set -e

      - name: Listar depois
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          CREDS="${FTP_USER}:${FTP_PASS}"
          echo "=== Depois — portal/ ==="
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}/portal/"
          echo ""
          echo "=== Depois — admin/ ==="
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}/admin/"
          echo ""
          echo "=== Depois — raiz (procurando órfãos) ==="
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}/" | grep -E "backend|chatbot|calculadora|google-apps-script" || echo "  ✅ raiz limpa"

name: Update Quality Baseline

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '.quality-baseline.json'
      - '.quality-history.json'

permissions:
  contents: write

jobs:
  update:
    runs-on: [self-hosted, windows-self-hosted]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: npm ci || npm install
      - run: npm run quality
      - run: npm run quality:update-baseline

      - name: Commit baseline (se mudou)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet .quality-baseline.json .quality-history.json; then
            echo "Baseline inalterada."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .quality-baseline.json .quality-history.json
          git commit -m "chore(quality): atualiza baseline (melhoria de métrica)"
          git push

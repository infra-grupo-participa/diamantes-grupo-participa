name: WIPE + redeploy do zero

on:
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  TARGET_URL: 'https://diamantes.grupoparticipa.app.br/servico/'

defaults:
  run:
    shell: bash

jobs:
  wipe-and-redeploy:
    name: Wipe FTP + redeploy clean
    runs-on: [self-hosted, windows-self-hosted]
    environment:
      name: production
      url: https://diamantes.grupoparticipa.app.br
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        env:
          HOSTINGER_FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          HOSTINGER_FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_FTP_PATH: ${{ secrets.HOSTINGER_FTP_PATH }}
          GP_CLICKUP_API_KEY: ${{ secrets.GP_CLICKUP_API_KEY }}
          GP_CLICKUP_WEBHOOK_SECRET: ${{ secrets.GP_CLICKUP_WEBHOOK_SECRET }}
          GP_SUPABASE_URL: ${{ secrets.GP_SUPABASE_URL }}
          GP_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.GP_SUPABASE_SERVICE_ROLE_KEY }}
          GP_SUPABASE_ANON_KEY: ${{ secrets.GP_SUPABASE_ANON_KEY }}
        run: |
          missing=()
          for v in HOSTINGER_FTP_HOST HOSTINGER_FTP_USER HOSTINGER_FTP_PASSWORD HOSTINGER_FTP_PATH GP_CLICKUP_API_KEY GP_CLICKUP_WEBHOOK_SECRET GP_SUPABASE_URL GP_SUPABASE_SERVICE_ROLE_KEY GP_SUPABASE_ANON_KEY; do
            if [ -z "${!v}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Listar conteúdo atual do FTP (antes do wipe)
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          FTP_PATH: ${{ secrets.HOSTINGER_FTP_PATH }}
        run: |
          set -e
          FTP_PATH="${FTP_PATH%/}/"
          CREDS="${FTP_USER}:${FTP_PASS}"
          echo "=== Conteúdo de ${FTP_PATH} antes do wipe ==="
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}${FTP_PATH}" || true

      - name: WIPE — apagar recursivamente todo o conteúdo
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          FTP_PATH: ${{ secrets.HOSTINGER_FTP_PATH }}
        run: |
          set +e
          FTP_PATH="${FTP_PATH%/}/"
          CREDS="${FTP_USER}:${FTP_PASS}"
          BASE_URL="ftp://${FTP_HOST}${FTP_PATH}"

          delete_recursive() {
            local rel="$1"
            local url="${BASE_URL}${rel}"
            echo "--- Listando ${rel:-/}"
            local listing
            listing=$(curl -sS --user "$CREDS" "$url")
            if [ -z "$listing" ]; then
              echo "    (vazio ou erro)"
              return
            fi
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              local perm name
              perm=$(echo "$line" | awk '{print $1}')
              name=$(echo "$line" | awk '{for (i=9; i<=NF; i++) printf "%s%s", $i, (i<NF?" ":"")}')
              [ -z "$name" ] && continue
              [ "$name" = "." ] && continue
              [ "$name" = ".." ] && continue
              local child="${rel}${name}"
              if [[ "$perm" == d* ]]; then
                delete_recursive "${child}/"
                echo "RMD  ${child}/"
                curl -sS --user "$CREDS" "${BASE_URL}${rel}" -Q "RMD ${name}" -o /dev/null
              else
                echo "DELE ${child}"
                curl -sS --user "$CREDS" "${BASE_URL}${rel}" -Q "DELE ${name}" -o /dev/null
              fi
            done <<< "$listing"
          }

          delete_recursive ""

          echo ""
          echo "=== Conteúdo após wipe ==="
          curl -sS --user "$CREDS" "${BASE_URL}" || true
          set -e

      - name: Assemble deploy artifact
        env:
          GP_CLICKUP_API_KEY: ${{ secrets.GP_CLICKUP_API_KEY }}
          GP_CLICKUP_WEBHOOK_SECRET: ${{ secrets.GP_CLICKUP_WEBHOOK_SECRET }}
          GP_SUPABASE_URL: ${{ secrets.GP_SUPABASE_URL }}
          GP_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.GP_SUPABASE_SERVICE_ROLE_KEY }}
          GP_SUPABASE_ANON_KEY: ${{ secrets.GP_SUPABASE_ANON_KEY }}
          GP_SHEETS_SYNC_URL: ${{ secrets.GP_SHEETS_SYNC_URL }}
          GP_SHEETS_SYNC_SECRET: ${{ secrets.GP_SHEETS_SYNC_SECRET }}
          GP_MAIL_FROM_EMAIL: 'infra@advmais.com'
          GP_MAIL_FROM_NAME: 'Grupo Participa'
        run: |
          set -e
          DEST="deploy-artifact"
          rm -rf "$DEST"
          mkdir -p "$DEST"

          shopt -s dotglob
          for entry in *; do
            if [ "$entry" = "$DEST" ] || [ "$entry" = ".git" ] || [ "$entry" = "node_modules" ]; then
              continue
            fi
            cp -r "$entry" "$DEST/"
          done
          shopt -u dotglob

          if [ -f .deployignore ]; then
            while IFS= read -r pattern || [ -n "$pattern" ]; do
              [[ -z "$pattern" || "$pattern" == \#* ]] && continue
              clean="${pattern%/}"
              find "$DEST" -path "$DEST/$clean" -exec rm -rf {} + 2>/dev/null || true
            done < .deployignore
          fi

          cat > "$DEST/.htaccess" <<EOF
          # Auto-generated by wipe-and-redeploy.yml — DO NOT edit on server.
          SetEnv GP_CLICKUP_API_KEY "${GP_CLICKUP_API_KEY}"
          SetEnv GP_CLICKUP_WEBHOOK_SECRET "${GP_CLICKUP_WEBHOOK_SECRET}"
          SetEnv GP_SUPABASE_URL "${GP_SUPABASE_URL}"
          SetEnv GP_SUPABASE_SERVICE_ROLE_KEY "${GP_SUPABASE_SERVICE_ROLE_KEY}"
          SetEnv GP_SUPABASE_ANON_KEY "${GP_SUPABASE_ANON_KEY}"
          SetEnv GP_SUPABASE_SCHEMA "portal"
          SetEnv GP_STORAGE_DRIVER "json"
          SetEnv GP_PORTALS_SOURCE "json"
          SetEnv GP_APP_BASE_URL "https://diamantes.grupoparticipa.app.br/servico"
          SetEnv GP_MAIL_FROM_EMAIL "${GP_MAIL_FROM_EMAIL}"
          SetEnv GP_MAIL_FROM_NAME "${GP_MAIL_FROM_NAME}"
          SetEnv GP_COOKIE_SECURE "true"
          ${GP_SHEETS_SYNC_URL:+SetEnv GP_SHEETS_SYNC_URL "${GP_SHEETS_SYNC_URL}"}
          ${GP_SHEETS_SYNC_SECRET:+SetEnv GP_SHEETS_SYNC_SECRET "${GP_SHEETS_SYNC_SECRET}"}

          Options -Indexes
          DirectoryIndex index.html index.php

          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteBase /servico/

              RewriteRule ^\$ index.html [L]

              RewriteCond %{REQUEST_URI} !^/servico/(api|admin|assets|portal|chatbot|backend|src|vendor|tests|docs|tmp|infra)(/|\$)
              RewriteRule ^([a-z][a-z0-9-]+)/?\$ portal/?slug=\$1 [L,R=302]
          </IfModule>

          <FilesMatch "^(\.htaccess|\.htpasswd|\.DS_Store|php\.ini|.*\.example|.*\.md)\$">
              Require all denied
          </FilesMatch>
          <FilesMatch "\.(env|log|sqlite3?|jsonl)\$">
              Require all denied
          </FilesMatch>
          <FilesMatch "\.json\$">
              Require all denied
          </FilesMatch>

          <IfModule mod_expires.c>
              ExpiresActive On
              ExpiresByType image/webp "access plus 7 days"
              ExpiresByType image/jpeg "access plus 7 days"
              ExpiresByType image/png "access plus 7 days"
              ExpiresByType text/css "access plus 1 day"
              ExpiresByType application/javascript "access plus 1 day"
          </IfModule>

          <IfModule mod_headers.c>
              Header set X-Content-Type-Options "nosniff"
              Header set X-Frame-Options "SAMEORIGIN"
              Header set Referrer-Policy "strict-origin-when-cross-origin"
              Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
              Header always set Permissions-Policy "geolocation=(), camera=(), microphone=()"
              Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.clickup.com https://*.supabase.co; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
          </IfModule>
          EOF

          echo "=== Artifact contents (top-level) ==="
          ls -la "$DEST/" | head -40

      - name: Upload completo via curl FTP
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          FTP_PATH: ${{ secrets.HOSTINGER_FTP_PATH }}
        run: |
          set -e
          FTP_PATH="${FTP_PATH%/}/"
          CREDS="${FTP_USER}:${FTP_PASS}"

          cd deploy-artifact

          UPLOADED=0
          SKIPPED=0
          FAILED=0
          while IFS= read -r f; do
            rel="${f#./}"
            case "$rel" in
              .git/*|.git|node_modules/*|node_modules) SKIPPED=$((SKIPPED+1)); continue ;;
              tests/*|tests|docs/*|docs|tmp/*|tmp|.github/*|.github) SKIPPED=$((SKIPPED+1)); continue ;;
            esac
            rel_enc=$(printf '%s' "$rel" | sed 's/ /%20/g')
            target="ftp://${FTP_HOST}${FTP_PATH}${rel_enc}"
            code=$(curl -sS --ftp-create-dirs --user "$CREDS" -T "$f" "$target" -w "%{http_code}" -o /dev/null --max-time 60 || echo "ERR")
            if [ "$code" = "226" ] || [ "$code" = "0" ] || [ "$code" = "" ]; then
              UPLOADED=$((UPLOADED+1))
            else
              echo "::warning::Upload falhou ($code): $rel"
              FAILED=$((FAILED+1))
            fi
          done < <(find . -type f)

          echo ""
          echo "Uploaded: $UPLOADED  Skipped: $SKIPPED  Failed: $FAILED"
          [ $FAILED -eq 0 ] || { echo "::error::$FAILED upload(s) falharam"; exit 1; }

      - name: Smoke — login + admin
        run: |
          set -e
          sleep 5
          STATUS=$(curl -s -o /tmp/login.html -w "%{http_code}" "${TARGET_URL}")
          echo "Login: $STATUS, $(wc -c < /tmp/login.html) bytes"
          [ "$STATUS" = "200" ] || { echo "::error::Login retornou $STATUS"; exit 1; }

          STATUS=$(curl -s -o /tmp/admin.html -w "%{http_code}" "${TARGET_URL}admin/")
          SIZE=$(wc -c < /tmp/admin.html)
          echo "Admin: $STATUS, $SIZE bytes"
          if grep -q "Funcionários" /tmp/admin.html && grep -q "nav-item" /tmp/admin.html; then
            echo "OK — novo visual no ar"
          else
            echo "::warning::Admin ainda não parece o novo visual (size: $SIZE)"
          fi

name: Delete admin/app.html (temporário)

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: [self-hosted, windows-self-hosted]
    defaults:
      run:
        shell: bash
    steps:
      - name: Listar antes
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          CREDS="${FTP_USER}:${FTP_PASS}"
          echo "=== Antes ==="
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}/admin/" | grep -E "app\.html|index\.html" || true

      - name: DELE admin/app.html
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          set +e
          CREDS="${FTP_USER}:${FTP_PASS}"
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}/admin/" -Q "DELE app.html" -o /dev/null && echo "Removido" || echo "Não existia"

      - name: Listar depois
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          CREDS="${FTP_USER}:${FTP_PASS}"
          echo "=== Depois ==="
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}/admin/" | grep -E "app\.html|index\.html" || echo "app.html sumiu — só index.html restou"

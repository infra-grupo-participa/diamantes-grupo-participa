name: Delete admin/app.html (temporário)

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: [self-hosted, windows-self-hosted]
    defaults:
      run:
        shell: bash
    steps:
      - name: Listar antes
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          CREDS="${FTP_USER}:${FTP_PASS}"
          echo "=== Antes ==="
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}/admin/" | grep -E "app\.html|index\.html" || true

      - name: DELE admin/app.html
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          set +e
          CREDS="${FTP_USER}:${FTP_PASS}"

          # Estratégia 1: pre-quote (executa antes do CWD), com caminho absoluto.
          echo "Tentativa 1: pre-quote DELE /admin/app.html"
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}/" -Q "DELE /admin/app.html" -o /dev/null
          echo "Exit: $?"

          # Estratégia 2: usa caminho absoluto e CWD para admin/ antes de DELE
          echo "Tentativa 2: CWD admin/ + DELE app.html (post-quote)"
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}/admin/" -Q "-DELE app.html" -o /dev/null
          echo "Exit: $?"

          # Estratégia 3: como remover por upload de zero bytes não dá certo, tenta
          # apagar via FTP path direto na URL
          echo "Tentativa 3: DELETE via -X com lftp se disponível"
          # Não temos lftp no Windows runner, então pula

          # Estratégia 4: pre-quote (CWD primeiro), depois DELE relativo
          # Sintaxe curl: -Q "+CMD" executa após PASV, dentro do dir.
          echo "Tentativa 4: post-quote (+DELE) após CWD"
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}/admin/" -Q "+DELE app.html" -o /dev/null
          echo "Exit: $?"

      - name: Listar depois
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          CREDS="${FTP_USER}:${FTP_PASS}"
          echo "=== Depois ==="
          curl -sS --user "$CREDS" "ftp://${FTP_HOST}/admin/" | grep -E "app\.html|index\.html" || echo "app.html sumiu — só index.html restou"

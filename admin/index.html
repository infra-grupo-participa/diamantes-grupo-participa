<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Portal de Acesso</title>
  <style>
    :root {
      --bg: #050505;
      --surface: rgba(255, 255, 255, 0.08);
      --panel: #ffffff;
      --line: rgba(15, 23, 42, 0.08);
      --text: #0f172a;
      --muted: #64748b;
      --accent: #F29725;
      --accent-strong: #F29725;
      --accent-soft: rgba(242, 151, 37, 0.12);
      --success: #16a34a;
      --warning: #F29725;
      --danger: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Sora", "Inter", "Segoe UI", sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at top left, rgba(242, 151, 37, 0.18), transparent 34%),
        radial-gradient(circle at bottom right, rgba(242, 151, 37, 0.14), transparent 28%),
        var(--bg);
      padding: 20px;
    }

    .admin-shell {
      width: min(1280px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 28px;
    }

    .board,
    .modal-card {
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 28px 80px rgba(0,0,0,0.26);
      overflow: hidden;
    }

    .action-button,
    .ghost-button,
    .approve-button,
    .danger-button,
    .link-button {
      border: none;
      border-radius: 16px;
      font: inherit;
      font-size: 0.84rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.16s, opacity 0.2s, box-shadow 0.2s;
    }

    .action-button,
    .approve-button {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 16px 26px rgba(242, 151, 37, 0.24);
    }

    .action-button,
    .ghost-button {
      padding: 13px 16px;
    }

    .ghost-button {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .board-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
      align-items: start;
    }

    .board {
      background: var(--panel);
      color: var(--text);
    }

    .board {
      padding: 24px;
    }

    .board-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .board-title-wrap {
      display: grid;
      gap: 10px;
    }

    .board-pill {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #475569;
      font-size: 0.74rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .board-title {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      color: var(--text);
    }

    .board-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat-card {
      padding: 18px;
      border-radius: 22px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .stat-card span {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-card strong {
      display: block;
      margin-top: 10px;
      font-size: 2rem;
      letter-spacing: -0.06em;
    }

    .filters {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .search-input,
    .row-select,
    .modal-card input,
    .modal-card select {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 14px 15px;
      font: inherit;
      font-size: 0.92rem;
      color: var(--text);
      background: #f8fafc;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .search-input:focus,
    .row-select:focus,
    .modal-card input:focus,
    .modal-card select:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(242, 151, 37, 0.12);
    }

    .filter-chip {
      padding: 11px 14px;
      border-radius: 999px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #475569;
    }

    .filter-chip.active {
      background: #ffffff;
      border-color: #F29725;
      color: #F29725;
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .user-card {
      display: grid;
      gap: 16px;
      padding: 18px;
      border-radius: 24px;
      background: #fff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 18px 34px rgba(15, 23, 42, 0.05);
    }

    .user-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .user-head strong {
      display: block;
      font-size: 1.02rem;
      letter-spacing: -0.03em;
      line-height: 1.12;
      text-wrap: pretty;
    }

    .user-meta {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .meta-chip,
    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .meta-chip {
      background: #f8fafc;
      color: #475569;
    }

    .status-chip.pending {
      background: #ffffff;
      color: var(--warning);
      box-shadow: inset 0 0 0 1px rgba(242, 151, 37, 0.28);
    }

    .status-chip.approved {
      background: rgba(22, 163, 74, 0.12);
      color: var(--success);
    }

    .status-chip.rejected {
      background: rgba(220, 38, 38, 0.12);
      color: var(--danger);
    }

    .status-chip.admin {
      background: rgba(242, 151, 37, 0.14);
      color: #c55a09;
      box-shadow: inset 0 0 0 1px rgba(242, 151, 37, 0.22);
    }

    .user-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 210px 210px;
      gap: 12px;
      align-items: end;
    }

    .row-field {
      display: grid;
      gap: 8px;
    }

    .row-field label {
      font-size: 0.74rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
    }

    .row-readonly {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 14px 15px;
      font-size: 0.92rem;
      color: var(--muted);
      background: #f8fafc;
    }

    .user-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .approve-button,
    .danger-button,
    .link-button {
      padding: 12px 14px;
    }

    .danger-button {
      color: var(--danger);
      background: rgba(220, 38, 38, 0.08);
    }

    .link-button {
      color: #334155;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      border: 1px dashed #cbd5e1;
      border-radius: 24px;
      color: #94a3b8;
      background: #f8fafc;
      line-height: 1.7;
    }

    .insights-shell {
      display: grid;
      gap: 18px;
    }

    .insights-board {
      position: relative;
    }

    .insights-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .insights-head h2 {
      margin: 0;
      color: var(--text);
      font-size: 1.6rem;
      letter-spacing: -0.05em;
    }

    .insights-head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.7;
      max-width: 720px;
    }

    .insights-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .insights-tools {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .insights-tab {
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      background: #f8fafc;
      color: #475569;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      padding: 11px 15px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .insights-tab.active {
      background: #ffffff;
      border-color: #F29725;
      color: #F29725;
    }

    .export-button {
      border: 1px solid #F29725;
      border-radius: 999px;
      background: #ffffff;
      color: #c55a09;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      padding: 11px 16px;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .export-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(242, 151, 37, 0.12);
    }

    .insights-view { display: none; }
    .insights-view.active { display: block; }

    .insights-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
    }

    .insight-card {
      min-width: 0;
      padding: 18px;
      border-radius: 24px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .insight-card span {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .insight-card strong {
      display: block;
      margin-top: 10px;
      color: var(--text);
      font-size: clamp(1.05rem, 1.45vw, 1.45rem);
      letter-spacing: -0.04em;
      line-height: 1.14;
      text-wrap: pretty;
      overflow-wrap: anywhere;
    }

    .insight-card small {
      display: block;
      margin-top: 8px;
      color: #64748b;
      font-size: 0.8rem;
      line-height: 1.6;
    }

    .insights-grid {
      display: grid;
      grid-template-columns: minmax(300px, 0.9fr) minmax(420px, 1.1fr);
      gap: 16px;
      margin-top: 16px;
      align-items: start;
    }

    .insight-panel {
      padding: 18px;
      border-radius: 24px;
      border: 1px solid #e2e8f0;
      background: #fff;
      box-shadow: 0 18px 34px rgba(15, 23, 42, 0.04);
    }

    .insight-panel h3 {
      margin: 0;
      font-size: 1rem;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .insight-panel p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.65;
    }

    .table-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .table-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .table-row strong {
      color: var(--text);
      font-size: 0.9rem;
    }

    .table-row span,
    .table-row small {
      color: #64748b;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .diamond-grid,
    .employee-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .diamond-focus-grid {
      display: grid;
      gap: 16px;
      margin-top: 16px;
    }

    .diamond-selector-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .diamond-selector-field {
      display: grid;
      gap: 8px;
      min-width: 0;
      flex: 1 1 320px;
    }

    .diamond-selector-field label {
      font-size: 0.74rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
    }

    .diamond-overview {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .diamond-overview-card {
      min-width: 0;
      padding: 18px 20px;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 14px;
      min-height: 128px;
    }

    .diamond-overview-card.primary {
      grid-column: 1 / -1;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border-color: rgba(242, 151, 37, 0.28);
      min-height: 164px;
    }

    .diamond-overview-card span {
      display: block;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .diamond-overview-card strong {
      display: block;
      color: var(--text);
      font-size: clamp(1.22rem, 1.8vw, 1.55rem);
      letter-spacing: -0.05em;
      line-height: 1.02;
      text-wrap: pretty;
      word-break: normal;
      overflow-wrap: normal;
      hyphens: none;
    }

    .diamond-overview-card.primary strong {
      max-width: 10ch;
      font-size: clamp(2rem, 3vw, 2.8rem);
    }

    .diamond-service-stack {
      display: grid;
      gap: 10px;
    }

    .diamond-service-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
    }

    .diamond-service-meta {
      display: grid;
      gap: 4px;
      min-width: 0;
      flex: 1 1 280px;
    }

    .diamond-service-meta strong {
      color: var(--text);
      font-size: 0.92rem;
      letter-spacing: -0.03em;
      line-height: 1.2;
      text-wrap: pretty;
    }

    .diamond-service-meta span {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.5;
    }

    .diamond-service-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .diamond-service-empty {
      padding: 28px 18px;
      border-radius: 22px;
      border: 1px dashed #cbd5e1;
      background: #f8fafc;
      color: #94a3b8;
      text-align: center;
      line-height: 1.7;
    }

    .client-profile-grid {
      display: grid;
      grid-template-columns: minmax(300px, 0.88fr) minmax(0, 1.12fr);
      gap: 20px;
      margin-top: 16px;
      align-items: start;
    }

    .client-profile-stack {
      display: grid;
      gap: 16px;
    }

    .client-profile-selector {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    .client-profile-selector label,
    .client-profile-section-title,
    .client-contract-grid label {
      font-size: 0.74rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
    }

    .client-kpi-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .client-kpi-card {
      padding: 18px;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      display: grid;
      gap: 8px;
    }

    .client-kpi-card.primary {
      grid-column: 1 / -1;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border-color: rgba(242, 151, 37, 0.28);
    }

    .client-kpi-card span {
      display: block;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .client-kpi-card strong {
      display: block;
      color: var(--text);
      font-size: clamp(1rem, 1.35vw, 1.28rem);
      line-height: 1.14;
      letter-spacing: -0.05em;
      text-wrap: pretty;
      overflow-wrap: anywhere;
    }

    .client-kpi-card.primary strong {
      font-size: clamp(1.5rem, 2vw, 2rem);
      line-height: 1.02;
    }

    .client-kpi-card small {
      display: block;
      color: #64748b;
      font-size: 0.82rem;
      line-height: 1.6;
    }

    .client-profile-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      background: #f8fafc;
      color: #475569;
      font-size: 0.78rem;
      font-weight: 800;
    }

    .client-profile-status.current {
      background: #ecfdf5;
      color: #047857;
    }

    .client-profile-status.late {
      background: #fff7ed;
      color: #c2410c;
    }

    .client-profile-status.canceled {
      background: #f8fafc;
      color: #64748b;
    }

    .client-profile-status.pending {
      background: #fee2e2;
      color: #b91c1c;
    }

    .client-monthly-banner {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      color: #475569;
      line-height: 1.6;
      font-size: 0.9rem;
    }

    .client-monthly-banner.pending {
      border-color: rgba(242, 151, 37, 0.28);
      background: rgba(242, 151, 37, 0.12);
      color: #9a3412;
    }

    .client-profile-form {
      display: grid;
      gap: 18px;
      margin-top: 16px;
    }

    .client-contract-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(220px, 1fr) minmax(220px, 1fr);
      gap: 14px;
      padding: 18px;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      align-items: start;
    }

    .client-contract-grid .row-select,
    .client-contract-grid input,
    .client-profile-field input {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 13px 14px;
      font: inherit;
      font-size: 0.92rem;
      background: #ffffff;
      color: var(--text);
    }

    .billing-status-group {
      position: relative;
      display: grid;
      gap: 10px;
    }

    .billing-toggle-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .billing-toggle {
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      padding: 10px 14px;
      background: #ffffff;
      color: #475569;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }

    .billing-toggle.current.active {
      border-color: #86efac;
      background: #ecfdf5;
      color: #047857;
      box-shadow: 0 10px 20px rgba(4, 120, 87, 0.08);
    }

    .billing-toggle.late.active {
      border-color: rgba(242, 151, 37, 0.45);
      background: #fff7ed;
      color: #c2410c;
      box-shadow: 0 10px 20px rgba(242, 151, 37, 0.12);
    }

    .billing-toggle.canceled.active {
      border-color: #cbd5e1;
      background: #f1f5f9;
      color: #475569;
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.06);
    }

    .billing-status-help {
      color: #64748b;
      font-size: 0.82rem;
      line-height: 1.6;
    }

    .billing-status-native {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      border: 0;
      opacity: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      clip-path: inset(50%);
      white-space: nowrap;
      pointer-events: none;
    }

    .client-profile-section {
      padding: 18px;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
      background: #ffffff;
      display: grid;
      gap: 14px;
    }

    .client-profile-fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .client-profile-field {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .client-profile-field.toggle,
    .client-profile-field.multi {
      grid-column: 1 / -1;
    }

    .client-toggle-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      color: #334155;

  <script>
  /**
   * Admin auth shim — bridges legacy portal-auth.js API surface to Supabase.
   *
   * The admin page calls:
   *   auth.init({ includeUsers: true })
   *   auth.getSessionUser()
   *   auth.getUsers()  → returns cached list of portal.users rows
   *   auth.getUserById(id)
   *   auth.getUserDocument(user)
   *   auth.formatDocument(value, type)
   *   auth.getClientRoutes()
   *   auth.getClientRouteBySlug(slug)
   *   auth.getClientUrl(slug)
   *   auth.toAppUrl(path)
   *   auth.updateUser(id, patch)  → UPDATE portal.users (admin only — RLS bypass via service role NOT available;
   *                                  we use supabase with anon key + RLS policies that allow admin writes)
   *   auth.createPendingUser(data, { setSession: false })
   *   auth.logout()
   *
   * Users in portal.users have shape: { id, name, email, role, status, client_slug, document_type, document_value, ... }
   * We map client_slug → clientSlug to match the legacy shape admin.html expects.
   */
  (function () {
    'use strict';

    const CLIENT_ROUTES = [
      { slug: "alessandro-lima",    label: "Alessandro Lima" },
      { slug: "anthony-sodre",      label: "Anthony Sodré" },
      { slug: "bartira-paes",       label: "Bartira Paes" },
      { slug: "bernadete",          label: "Bernadete" },
      { slug: "bruno-couto",        label: "Bruno Couto" },
      { slug: "claudia-kellner",    label: "Claudia Kellner" },
      { slug: "deyse-engel",        label: "Deyse Engel" },
      { slug: "fabiana-parro",      label: "Fabiana Parro" },
      { slug: "isabela-teixeira",   label: "Isabela Teixeira" },
      { slug: "felipe-schroeder",   label: "Felipe Schroeder" },
      { slug: "fernanda-lessa",     label: "Fernanda Lessa" },
      { slug: "joao-carlos-lima",   label: "João Carlos Lima" },
      { slug: "joao-eduardo-zanela",label: "João Eduardo Zanela" },
      { slug: "katia-paixao",       label: "Katia Paixão" },
      { slug: "luciano-simionato",  label: "Luciano Simionato" },
      { slug: "luis-rocha",         label: "Luís Rocha" },
      { slug: "matheus-borges",     label: "Matheus Borges" },
      { slug: "nairio",             label: "Naírio" },
      { slug: "osvaldo-catena",     label: "Osvaldo Catena" },
      { slug: "paulo-guaraciaba",   label: "Paulo Guaraciaba" },
      { slug: "pedro-nery",         label: "Pedro Nery" },
      { slug: "priscila-ziliani",   label: "Priscila Ziliani" },
      { slug: "rafael-molino",      label: "Rafael Molino" },
      { slug: "roberto-gaspar",     label: "Roberto Gaspar" },
      { slug: "suely-resende",      label: "Suely Resende" },
      { slug: "vitor-negrao",       label: "Vitor Negrão" },
      { slug: "willian-loro",       label: "Willian Loro" },
    ];

    let _users = [];
    const _v2 = window.PortalAuth; // already loaded portal-auth-v2.js

    function mapRow(row) {
      if (!row) return null;
      return {
        id: String(row.id || row.auth_user_id || ''),
        // Use auth_user_id as the canonical id for updateUser calls (matched by portal.users PK)
        _dbId: row.id,
        name: row.name || '',
        email: row.email || '',
        role: row.role || 'client',
        status: row.status || 'pending',
        clientSlug: row.client_slug || '',
        documentType: row.document_type || 'cpf',
        documentValue: row.document_value || '',
      };
    }

    function digitsOnly(value, max) {
      return String(value || '').replace(/\D+/g, '').slice(0, max || 14);
    }
    function inferDocumentType(value, fallback) {
      const d = String(value || '').replace(/\D+/g, '');
      if (d.length === 14) return 'cnpj';
      if (d.length === 11) return 'cpf';
      return fallback === 'cnpj' ? 'cnpj' : 'cpf';
    }
    function formatDocument(value, type) {
      const t = inferDocumentType(value, type);
      const d = digitsOnly(value, t === 'cnpj' ? 14 : 11);
      if (t === 'cnpj') {
        let f = d.slice(0,2);
        if (d.length > 2) f += '.' + d.slice(2,5);
        if (d.length > 5) f += '.' + d.slice(5,8);
        if (d.length > 8) f += '/' + d.slice(8,12);
        if (d.length > 12) f += '-' + d.slice(12,14);
        return f;
      }
      const parts = [];
      if (d.slice(0,3)) parts.push(d.slice(0,3));
      if (d.slice(3,6)) parts.push(d.slice(3,6));
      if (d.slice(6,9)) parts.push(d.slice(6,9));
      const suffix = d.slice(9,11);
      return `${parts.join('.')}${suffix ? '-' + suffix : ''}`;
    }
    function getUserDocument(user) {
      const stored = String((user && (user.documentValue || user.cpf)) || '');
      const type = inferDocumentType(stored, user && user.documentType || 'cpf');
      return { type, value: digitsOnly(stored, type === 'cnpj' ? 14 : 11) };
    }

    async function init(options) {
      // Delegate session check to v2
      const user = await _v2.init();
      if (!user || user.role !== 'admin') return null;

      // Load all portal.users rows (admin sees all via RLS policy)
      if (options && options.includeUsers) {
        await reloadUsers();
      }
      return user;
    }

    async function reloadUsers() {
      const supabase = window.getSupabaseClient();
      const { data, error } = await supabase
        .from('users')
        .select('id,auth_user_id,name,email,role,status,client_slug,document_type,document_value')
        .order('created_at', { ascending: false });
      if (!error && data) {
        _users = data.map(mapRow).filter(Boolean);
      }
      return _users;
    }

    function getSessionUser() { return _v2.getSessionUser(); }

    function getUsers() { return _users.slice(); }

    function getUserById(id) {
      return _users.find((u) => u.id === id || u._dbId === id) || null;
    }

    function getClientRoutes() { return CLIENT_ROUTES.slice(); }

    function getClientRouteBySlug(slug) {
      return CLIENT_ROUTES.find((r) => r.slug === slug) || null;
    }

    function getClientUrl(slug) { return _v2.getClientUrl(slug); }
    function toAppUrl(path) { return _v2.toAppUrl(path); }

    async function updateUser(userId, patch) {
      const supabase = window.getSupabaseClient();
      const user = getUserById(userId);
      const dbId = user ? user._dbId : userId;

      // Build Supabase column names from the patch (camelCase → snake_case)
      const update = {};
      if (patch.name !== undefined)          update.name = patch.name;
      if (patch.email !== undefined)         update.email = patch.email;
      if (patch.role !== undefined)          update.role = patch.role;
      if (patch.status !== undefined)        update.status = patch.status;
      if (patch.clientSlug !== undefined)    update.client_slug = patch.clientSlug;
      if (patch.documentType !== undefined)  update.document_type = patch.documentType;
      if (patch.documentValue !== undefined) update.document_value = patch.documentValue;

      const { data, error } = await supabase
        .from('users')
        .update(update)
        .eq('id', dbId)
        .select('id,auth_user_id,name,email,role,status,client_slug,document_type,document_value')
        .single();

      if (error) throw new Error(error.message || 'Erro ao atualizar usuário.');

      const mapped = mapRow(data);
      const idx = _users.findIndex((u) => u._dbId === dbId || u.id === userId);
      if (idx >= 0) _users[idx] = mapped;
      else _users.push(mapped);

      // Sync user_metadata on auth.users if role/status changed
      // (best-effort: no service role here; admin client JWT has limited perms on auth schema)
      // The supabase RLS admin functions handle the portal.users side; auth.users metadata
      // will be updated next time the user logs in via fetchProfileSlug in portal-auth-v2.

      return mapped;
    }

    async function createPendingUser(data, options) {
      const supabase = window.getSupabaseClient();
      const name  = String(data.name || '').trim();
      const email = String(data.email || '').trim().toLowerCase();
      const password = String(data.password || '');
      const docType  = data.documentType === 'cnpj' ? 'cnpj' : 'cpf';
      const docValue = digitsOnly(data.documentValue || '', docType === 'cnpj' ? 14 : 11);

      // Create auth user via supabase.auth.admin is not available from client SDK.
      // Use signUp instead (admin creates account on behalf of user via the standard flow).
      const shouldSetSession = !(options && options.setSession === false);
      const { data: signUpData, error: signUpErr } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: { name, role: data.role || 'client', status: data.status || 'pending' },

      });
      if (signUpErr) throw new Error(signUpErr.message);
      if (!signUpData?.user) throw new Error('Cadastro não concluído.');

      // If admin is creating user and does not want to set a session, sign back in as admin.
      // Note: signUp may create a session — sign out and restore admin session if needed.
      if (!shouldSetSession) {

        // This is best-effort; the admin may need to reload if session flipped.
        // In most Supabase configs with email confirm on, signUp won't create a session.
      }

      // Insert into portal.users (may already exist via auth trigger, but upsert is safe)
      const { data: insertData, error: insertErr } = await supabase
        .from('users')
        .upsert({
          auth_user_id: signUpData.user.id,
          name,
          email,

          status: data.status || 'pending',
          client_slug: data.clientSlug || '',

        .select('id,auth_user_id,name,email,role,status,client_slug,document_type,document_value')
        .single();

      if (insertErr) throw new Error(insertErr.message);

      const mapped = mapRow(insertData);
      _users.push(mapped);
      return mapped;

      const priority = { pending: 0, approved: 1, rejected: 2 };
      return [...users].sort((a, b) => {
        const byStatus = (priority[a.status] ?? 9) - (priority[b.status] ?? 9);
        if (byStatus !== 0) return byStatus;
        return (a.name || "").localeCompare(b.name || "", "pt-BR");
      });

      const query = searchInput.value.trim().toLowerCase();

          || (activeFilter === "pending" && user.role !== "admin" && user.status === "pending")
          || (activeFilter === "rejected" && user.role !== "admin" && user.status === "rejected");
        if (!matchesFilter) return false;
        if (!query) return true;
        const document = auth.getUserDocument(user);
        return [user.name, user.email, document.value, auth.formatDocument(document.value, document.type), getDocumentLabel(document.type)].some((value) =>

      try {
        renderDiamondsDashboard(snapshot);
      } catch (error) {
        renderInsightError(diamondsDashboard, "Erro ao carregar diamantes.", error);
      }
      try {
        renderClientsDashboard(snapshot);
      } catch (error) {
        renderInsightError(clientsDashboard, "Erro ao carregar clientes.", error);
      }
      try {
        renderEmployeesDashboard(snapshot);
      } catch (error) {
        renderInsightError(employeesDashboard, "Erro ao carregar funcionários.", error);
      }
      try {
        renderSatisfactionDashboard(snapshot);
      } catch (error) {
        renderInsightError(satisfactionDashboard, "Erro ao carregar satisfação.", error);
      }
      syncInsightTabs();
    }

    function renderUsers() {
      renderStats();
      const users = getFilteredUsers();

      if (!users.length) {
        usersList.innerHTML = `<div class="empty-state">Nenhum usuário encontrado com esse filtro.</div>`;
        return;
      }

      usersList.innerHTML = users.map((user) => {
        const route = auth.getClientRouteBySlug(user.clientSlug);
        const document = auth.getUserDocument(user);
        const statusMeta = getUserStatusMeta(user);
        const decisionButtons = user.status === "pending"
          ? `
              <button type="button" class="approve-button" data-action="approve" data-user-id="${user.id}">Aprovar</button>
              <button type="button" class="danger-button" data-action="reject" data-user-id="${user.id}">Rejeitar</button>
            `
          : "";
        const openButton = user.role !== "admin" && user.status === "approved" && route
          ? `<button type="button" class="link-button" data-action="open" data-user-id="${user.id}">Abrir portal</button>`
          : "";
        const roleButton = user.id !== "seed-admin"
          ? user.role === "admin"
            ? `<button type="button" class="link-button" data-action="revoke-admin" data-user-id="${user.id}">Remover admin</button>`
            : `<button type="button" class="link-button" data-action="grant-admin" data-user-id="${user.id}">Tornar admin</button>`
          : "";
        const destinationMarkup = user.role === "admin"
          ? `<div class="row-readonly">Acesso total ao painel admin</div>`
          : `
              <select class="row-select" data-client-select="${user.id}">
                ${getClientOptionsMarkup(user.clientSlug)}
              </select>
            `;

        return `
          <article class="user-card" data-user-id="${user.id}">
            <div class="user-head">
              <div>
                <strong>${escapeHtml(user.name)}</strong>
                <div class="user-meta">
                  <span class="meta-chip">${escapeHtml(user.email)}</span>
                  <span class="meta-chip">${getDocumentLabel(document.type)} ${escapeHtml(auth.formatDocument(document.value, document.type))}</span>
                  <span class="status-chip ${statusMeta.className}">${statusMeta.label}</span>
                </div>
              </div>
              <div class="meta-chip">${user.role === "admin" ? "acesso total" : route ? route.label : "sem destino"}</div>
            </div>
            <div class="user-grid">
              <div class="row-field">
                <label>${user.role === "admin" ? "Acesso do usuário" : "Destino do usuário"}</label>
                ${destinationMarkup}
              </div>
              <div class="user-actions">${decisionButtons}</div>
              <div class="user-actions">
                ${roleButton}
                <button type="button" class="link-button" data-action="edit" data-user-id="${user.id}">Editar</button>
                ${openButton}
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    async function refreshAdminDataInBackground() {
      if (adminRefreshBusy) {
        return;
      }

      adminRefreshBusy = true;
      try {
        await auth.init({ includeUsers: true, force: true });
        await window.PortalInsights.init({ force: true, silent: true });
        renderUsers();
        renderAnalytics();
      } catch (error) {
        // Keep the current screen visible even if a background refresh fails.
      } finally {
        adminRefreshBusy = false;
      }
    }

    function startAdminLiveRefresh() {
      if (adminRefreshTimer) {
        return;
      }

      adminRefreshTimer = window.setInterval(() => {
        if (!document.hidden) {
          refreshAdminDataInBackground();
        }
      }, 30000);

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          refreshAdminDataInBackground();
        }
      });

      window.addEventListener("focus", () => {
        refreshAdminDataInBackground();
      });
    }

    function openModal(user) {
      editingUserId = user ? user.id : null;
      modalTitle.textContent = user ? "Editar usuário" : "Criar usuário manual";
      const document = auth.getUserDocument(user || {});
      formName.value = user ? user.name : "";
      formEmail.value = user ? user.email : "";
      formPassword.value = user ? user.password : "";
      formDocumentType.value = document.type;
      formDocumentValue.value = document.value;
      syncDocumentField();
      formClientSlug.innerHTML = getClientOptionsMarkup(user ? user.clientSlug : "");
      formStatus.value = user ? user.status : "pending";
      formRole.value = user ? (user.role || "client") : "client";
      formRole.disabled = !!(user && user.id === "seed-admin");
      syncRoleField();
      userModal.classList.add("show");
    }

    function closeModal() {
      editingUserId = null;
      userForm.reset();
      formDocumentType.value = "cpf";
      formDocumentValue.value = "";
      formRole.value = "client";
      formRole.disabled = false;
      syncDocumentField();
      syncRoleField();
      userModal.classList.remove("show");
    }

    async function approveUser(userId) {
      const select = document.querySelector(`[data-client-select="${userId}"]`);
      const clientSlug = select ? select.value : "";
      if (!clientSlug) {
        showToast("Escolha o destino antes de aprovar.", true);
        return;
      }
      try {
        await auth.updateUser(userId, { status: "approved", clientSlug });
        renderUsers();
        renderAnalytics();
        showToast("Usuário aprovado com sucesso.");
      } catch (error) {
        showToast(error.message || "Não foi possível aprovar.", true);
      }
    }

    async function rejectUser(userId) {
      try {
        await auth.updateUser(userId, { status: "rejected" });
        renderUsers();
        renderAnalytics();
        showToast("Usuário movido para rejeitado.");
      } catch (error) {
        showToast(error.message || "Não foi possível rejeitar.", true);
      }
    }

    async function toggleAdminAccess(user, shouldGrantAdmin) {
      if (!user || user.id === "seed-admin") {
        showToast("Esse admin principal não pode ser alterado por aqui.", true);
        return;
      }

      if (!shouldGrantAdmin && user.id === sessionUser.id) {
        showToast("Você não pode remover o próprio acesso de admin.", true);
        return;
      }

      try {
        await auth.updateUser(user.id, shouldGrantAdmin
          ? { role: "admin", status: "approved", clientSlug: "" }
          : { role: "client", status: "pending", clientSlug: "" }
        );
        renderUsers();
        renderAnalytics();
        showToast(shouldGrantAdmin ? "Acesso de admin liberado com sucesso." : "Acesso de admin removido. O usuário voltou para pendente.");
      } catch (error) {
        showToast(error.message || "Não foi possível atualizar a permissão.", true);
      }
    }

    usersList.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      const { action, userId } = button.dataset;
      const user = auth.getUserById(userId);
      if (!user) return;

      if (action === "approve") {
        await approveUser(userId);
        return;
      }

      if (action === "reject") {
        await rejectUser(userId);
        return;
      }

      if (action === "edit") {
        openModal(user);
        return;
      }

      if (action === "grant-admin") {
        await toggleAdminAccess(user, true);
        return;
      }

      if (action === "revoke-admin") {
        await toggleAdminAccess(user, false);
        return;
      }

      if (action === "open" && user.clientSlug) {
        window.open(auth.getClientUrl(user.clientSlug), "_blank");
      }
    });

    userForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        const payload = {
          name: formName.value,
          email: formEmail.value,
          password: formPassword.value,
          documentType: formDocumentType.value,
          documentValue: formDocumentValue.value,
          clientSlug: formRole.value === "admin" ? "" : formClientSlug.value,
          status: formRole.value === "admin" ? "approved" : formStatus.value,
          role: formRole.value
        };

        if (editingUserId) {
          await auth.updateUser(editingUserId, payload);
        } else {
          const created = await auth.createPendingUser(payload, { setSession: false });
          await auth.updateUser(created.id, payload);
        }

        closeModal();
        renderUsers();
        renderAnalytics();
        showToast("Usuário salvo com sucesso.");
      } catch (error) {
        showToast(error.message || "Não foi possível salvar.", true);
      }
    });

    formDocumentType.addEventListener("change", syncDocumentField);
    formDocumentValue.addEventListener("input", syncDocumentField);
    formRole.addEventListener("change", syncRoleField);

    document.querySelectorAll("[data-filter]").forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;
        document.querySelectorAll("[data-filter]").forEach((chip) => {
          chip.classList.toggle("active", chip.dataset.filter === activeFilter);
        });
        renderUsers();
      });
    });

    searchInput.addEventListener("input", renderUsers);

    document.getElementById("newUserButton").addEventListener("click", () => openModal(null));
    document.getElementById("closeModalButton").addEventListener("click", closeModal);
    document.getElementById("cancelModalButton").addEventListener("click", closeModal);
    document.getElementById("logoutButton").addEventListener("click", () => {
      auth.logout();
    });
    document.getElementById("backToLoginButton").addEventListener("click", () => {
      window.location.href = auth.toAppUrl("index.html");
    });

    userModal.addEventListener("click", (event) => {
      if (event.target === userModal) closeModal();
    });

    document.querySelectorAll("[data-insight-tab]").forEach((button) => {
      button.addEventListener("click", (event) => {
        event.preventDefault();
        activeInsightTab = button.dataset.insightTab || "diamonds";
        syncInsightTabs();
      });
    });

    exportSpreadsheetButton.addEventListener("click", exportSpreadsheet);

    diamondsDashboard.addEventListener("click", async (event) => {
      const addButton = event.target.closest('[data-action="add-service"]');
      if (addButton) {
        openServiceModal(addButton.dataset.clientSlug || "");
        return;
      }

      const button = event.target.closest("[data-contract-client]");
      if (!button) return;
      await PortalInsights.toggleContractStatus(
        button.dataset.contractClient,
        button.dataset.contractService,
        button.dataset.contractEmployee
      );
      renderAnalytics();
      showToast("Status do serviço atualizado.");
    });

    diamondsDashboard.addEventListener("change", (event) => {
      const selector = event.target.closest("[data-diamond-client-selector]");
      if (!selector) return;
      activeDiamondClientSlug = selector.value || "";
      renderAnalytics();
    });

    clientsDashboard.addEventListener("click", (event) => {
      const billingButton = event.target.closest("[data-billing-value]");
      if (billingButton) {
        const form = billingButton.closest("[data-client-profile-form]");
        const select = form ? form.querySelector('[name="clientBillingStatus"]') : null;
        if (select) {
          select.value = billingButton.dataset.billingValue || "current";
          syncClientBillingForm(form);
        }
        return;
      }

      const portalButton = event.target.closest("[data-open-client-portal]");
      if (!portalButton) return;
      window.open(auth.getClientUrl(portalButton.dataset.openClientPortal), "_blank");
    });

    clientsDashboard.addEventListener("change", (event) => {
      const selector = event.target.closest("[data-client-profile-selector]");
      if (selector) {
        activeClientProfileSlug = selector.value || "";
        renderAnalytics();
        return;
      }

      const billingSelect = event.target.closest('[name="clientBillingStatus"]');
      if (billingSelect) {
        syncClientBillingForm(billingSelect.closest("[data-client-profile-form]"));
      }
    });

    clientsDashboard.addEventListener("submit", async (event) => {
      const form = event.target.closest("[data-client-profile-form]");
      if (!form) return;
      event.preventDefault();

      const clientSlug = form.dataset.clientSlug || "";
      if (!clientSlug) {
        showToast("Cliente não identificado para salvar o perfil.", true);
        return;
      }

      const submitButton = form.querySelector('button[type="submit"]');
      if (submitButton) submitButton.disabled = true;

      try {
        await PortalInsights.saveClientProfile(clientSlug, collectClientProfilePayload(form));
        renderAnalytics();
        showToast("Perfil do cliente salvo com sucesso.");
      } catch (error) {
        showToast(error.message || "Não foi possível salvar o perfil do cliente.", true);
      } finally {
        if (submitButton) submitButton.disabled = false;
      }
    });

    serviceType.addEventListener("change", () => {
      syncServiceEmployeeOptions("");
    });

    serviceForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      try {
        if (!serviceClientSlug.value) {
          throw new Error("Escolha o cliente.");
        }

        if (!serviceType.value) {
          throw new Error("Escolha o serviço.");
        }

        if (!serviceEmployee.value) {
          throw new Error("Escolha o prestador.");
        }

        await PortalInsights.upsertContract(
          serviceClientSlug.value,
          serviceType.value,
          serviceEmployee.value,
          { status: serviceStatus.value, startedAt: serviceStartedAt.value }
        );

        closeServiceModal();
        renderAnalytics();
        showToast("Serviço adicionado ao cliente.");
      } catch (error) {
        showToast(error.message || "Não foi possível adicionar o serviço.", true);
      }
    });

    document.getElementById("closeServiceModalButton").addEventListener("click", closeServiceModal);
    document.getElementById("cancelServiceModalButton").addEventListener("click", closeServiceModal);

    serviceModal.addEventListener("click", (event) => {
      if (event.target === serviceModal) closeServiceModal();
    });

    syncDocumentField();
    renderUsers();
    renderAnalytics();
    startAdminLiveRefresh();
    })();
  </script>
</body>
</html>

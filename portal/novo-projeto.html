<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novo Projeto — Diamantes</title>
  <link rel="stylesheet" href="/assets/css/inter.css" />
  <link rel="stylesheet" href="/portal/assets/portal.css" />
  <style>
    body { background:#f5f5f5; min-height:100vh; }
    .page-wrap { max-width:720px; margin:0 auto; padding:40px 20px; }
    h1 { font-size:1.5rem; font-weight:700; color:#1a1a1a; margin-bottom:6px; }
    .subtitle { color:#666; font-size:.95rem; margin-bottom:28px; }
    .service-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; margin-bottom:28px; }
    .service-card { border:2px solid #e0e0e0; border-radius:12px; padding:18px 16px; cursor:pointer; transition:.15s; background:#fff; text-align:left; position:relative; }
    .service-card:hover { border-color:#F29725; background:#fffbf4; }
    .service-card.selected { border-color:#F29725; background:#fffbf4; }
    .service-card .icon { font-size:1.8rem; margin-bottom:8px; }
    .service-card .name { font-weight:600; font-size:.95rem; color:#1a1a1a; }
    .service-card .desc { font-size:.8rem; color:#888; margin-top:4px; }
    .service-card .chk { position:absolute; top:12px; right:12px; width:20px; height:20px; border-radius:50%; border:2px solid #ddd; display:grid; place-items:center; color:#fff; }
    .service-card.selected .chk { background:#F29725; border-color:#F29725; }
    .field-group { margin-bottom:24px; }
    label { display:block; font-size:.875rem; font-weight:600; color:#333; margin-bottom:6px; }
    input[type=text] { width:100%; padding:10px 14px; border:1.5px solid #ddd; border-radius:8px; font-size:.95rem; outline:none; transition:border-color .15s; box-sizing:border-box; }
    input[type=text]:focus { border-color:#F29725; }
    .btn-primary { background:#F29725; color:#fff; border:none; border-radius:8px; padding:12px 28px; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .15s; width:100%; }
    .btn-primary:hover { background:#d9841a; }
    .btn-primary:disabled { background:#ccc; cursor:not-allowed; }
    .btn-back { background:none; border:none; color:#888; font-size:.875rem; cursor:pointer; padding:0; margin-bottom:20px; display:inline-flex; align-items:center; gap:6px; }
    .btn-back:hover { color:#333; }
    .error-msg { color:#e53935; font-size:.85rem; margin-top:8px; display:none; }
    .gate { background:#FFF7ED; border:1px solid #FDBA74; border-radius:10px; padding:16px 18px; color:#9A3412; }
    .gate a { color:#9A3412; font-weight:700; }
  </style>
</head>
<body>
<div id="app" class="page-wrap">
  <button class="btn-back" onclick="window.location.href='/portal/projetos.html'+location.search">← Voltar</button>
  <h1>Novo Projeto (Evento)</h1>
  <p class="subtitle">Dê um nome ao evento e confirme os serviços que entram nele. Em seguida você preenche o briefing com os dados da campanha.</p>

  <div id="content" style="display:none">
    <div class="field-group">
      <label for="projectTitle">Nome do evento *</label>
      <input type="text" id="projectTitle" placeholder="Ex.: Seminário Tributário Jun/26" maxlength="120" />
      <p class="error-msg" id="titleError">Preencha o nome do evento.</p>
    </div>

    <div class="field-group">
      <label>Serviços deste evento *</label>
      <div class="service-grid" id="serviceGrid"></div>
      <p class="error-msg" id="serviceError">Selecione ao menos um serviço.</p>
      <p class="error-msg" id="apiError"></p>
    </div>

    <button class="btn-primary" id="btnCreate" onclick="createProject()">Continuar para o Briefing →</button>
  </div>

  <div id="gate" class="gate" style="display:none">
    Você precisa concluir o <a href="/portal/briefing-basico.html">Briefing Básico</a> antes de criar projetos.
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js" integrity="sha384-2zrRDgDHSYB/GN3nFW3fsZXoxEhKIr3N2h63Tc6DEOB9JJdFIu8xMJT2Cph/gBil" crossorigin="anonymous"></script>
<script src="/assets/js/supabase-config.js"></script>
<script src="/assets/js/portal-auth-v2.js"></script>
<script src="/portal/assets/briefing-templates.js"></script>
<script>
const ICONS = { anuncios_pagos:'📣', edicao_video:'🎬', paginas:'💻', automacao:'⚙️' };
const DESC  = { anuncios_pagos:'Meta · Google · YouTube', edicao_video:'Reels · VSL · YouTube', paginas:'Landing pages · Domínio', automacao:'WhatsApp · Integrações' };
let selected = new Set();

function renderServices(services){
  const grid = document.getElementById('serviceGrid');
  if (!services.length) {
    grid.innerHTML = `<div style="color:#888;font-size:.9rem;grid-column:1/-1;">Nenhum serviço contratado encontrado. Fale com a coordenação.</div>`;
    return;
  }
  grid.innerHTML = services.map(s => `
    <div class="service-card selected" data-value="${s}" onclick="toggle(this)">
      <div class="chk"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="icon">${ICONS[s]||'📋'}</div>
      <div class="name">${(window.BRIEFING_SERVICE_LABELS[s]||s)}</div>
      <div class="desc">${DESC[s]||''}</div>
    </div>`).join('');
  services.forEach(s => selected.add(s));
}
function toggle(el){
  const v = el.dataset.value;
  if (selected.has(v)) { selected.delete(v); el.classList.remove('selected'); }
  else { selected.add(v); el.classList.add('selected'); }
  document.getElementById('serviceError').style.display='none';
}

async function createProject(){
  const title = document.getElementById('projectTitle').value.trim();
  let ok = true;
  document.getElementById('titleError').style.display='none';
  document.getElementById('serviceError').style.display='none';
  document.getElementById('apiError').style.display='none';
  if (!title) { document.getElementById('titleError').style.display='block'; ok=false; }
  if (selected.size===0) { document.getElementById('serviceError').style.display='block'; ok=false; }
  if (!ok) return;

  const btn = document.getElementById('btnCreate');
  btn.disabled = true; btn.textContent = 'Criando...';
  try {
    const supabase = window.getSupabaseClient();
    const { data, error } = await supabase.rpc('create_project', {
      p_title: title, p_general: {}, p_services: Array.from(selected),
    });
    if (error || !data) throw new Error((error && error.message) || 'Não foi possível criar o projeto.');
    window.location.href = '/portal/briefing.html?projeto=' + data.id;
  } catch (err) {
    const el = document.getElementById('apiError');
    el.textContent = err.message || 'Erro ao criar projeto.';
    el.style.display='block';
    btn.disabled=false; btn.textContent='Continuar para o Briefing →';
  }
}

(async () => {
  const user = await PortalAuth.init();
  if (!user || user.role === 'admin' || user.role === 'operator') { window.location.replace('/'); return; }
  const supabase = window.getSupabaseClient();
  const { data } = await supabase.rpc('get_client_briefing');
  if (!data || data.base_status !== 'submitted') {
    document.getElementById('gate').style.display='block';
    return;
  }
  document.getElementById('content').style.display='block';
  // serviços contratados ativos para briefing
  const services = (data.services || []).filter(s => (window.BRIEFING_ACTIVE_SERVICES||[]).includes(s));
  renderServices(services);
})();
</script>
</body>
</html>

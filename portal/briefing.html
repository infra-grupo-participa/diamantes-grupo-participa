<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Briefing do Projeto — Diamantes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/briefing.css" />
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-brand-mark"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
        <div><div class="sidebar-brand-name">Diamantes</div><div class="sidebar-brand-sub">Briefing do Projeto</div></div>
      </div>
    </div>
    <div class="sidebar-progress">
      <div class="sidebar-progress-label">Progresso <span id="progressPct">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="sidebar-section-label">Seções</div>
    <div class="sidebar-nav" id="sidebarNav"></div>
  </nav>

  <main class="main">
    <div class="page-header">
      <button class="page-back" onclick="goBack()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg><span>Voltar para projetos</span></button>
      <h1 class="page-title" id="pageTitle">Briefing</h1>
      <div class="page-meta" id="pageMeta">Carregando...</div>
    </div>

    <div id="submittedBanner" class="status-banner ok" style="display:none">
      <div class="sb-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div><strong>Briefing enviado para a equipe!</strong><p>A equipe recebeu o contexto completo e já pode começar a trabalhar.</p></div>
    </div>

    <div id="validationBar" class="validation-bar"></div>
    <div id="sections"></div>
    <div style="height:64px"></div>
  </main>

  <div class="bottom-bar">
    <div class="save-status" id="saveStatus"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span id="saveStatusText">—</span></div>
    <div class="btn-group">
      <button class="btn-ghost" onclick="goBack()">Salvar e sair</button>
      <button class="btn-send" id="btnSubmit" onclick="submitBriefing()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Enviar para a Equipe
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js" integrity="sha384-2zrRDgDHSYB/GN3nFW3fsZXoxEhKIr3N2h63Tc6DEOB9JJdFIu8xMJT2Cph/gBil" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script src="../assets/js/portal-auth-v2.js"></script>
<script src="assets/briefing-templates.js"></script>
<script>
const PROJECT_ID = new URLSearchParams(location.search).get('projeto');
function goBack() { window.location.href = 'projetos.html'; }
if (!PROJECT_ID) window.location.replace('projetos.html');

let supabase;
let project    = null;
let services   = [];      // serviços do evento
let baseAccess = {};      // acessos herdados (read-only)
let model      = { general: {}, services: {} };
let units      = [];      // unidades de render
let unitIdx    = {};
let saveTimer  = null;

// ── value accessors ──────────────────────────────────────────
function readVal(u, fid) {
  if (u.kind === 'general') return (model.general || {})[fid];
  if (u.kind === 'access')  return ((baseAccess[u.service] || {}))[fid];
  return (((model.services || {})[u.service]) || {})[fid];
}
function writeVal(u, fid, value) {
  if (u.kind === 'general') { model.general = model.general || {}; model.general[fid] = value; return; }
  model.services = model.services || {};
  model.services[u.service] = model.services[u.service] || {};
  model.services[u.service][fid] = value;
}

async function init() {
  const user = await PortalAuth.init();
  if (!user) { window.location.replace('/'); return; }
  supabase = window.getSupabaseClient();

  const { data, error } = await supabase.from('projects')
    .select('id, title, services, briefing, briefing_status, client_slug').eq('id', PROJECT_ID).single();
  if (error || !data) { alert('Projeto não encontrado.'); return goBack(); }

  project  = data;
  services = (data.services && data.services.length) ? data.services : [];
  model = Object.assign({ general: {}, services: {} }, data.briefing || {});
  model.general = model.general || {}; model.services = model.services || {};

  try { const cb = await supabase.rpc('get_client_briefing'); baseAccess = (cb.data && cb.data.access) || {}; } catch (_) {}

  buildUnits();
  document.getElementById('pageTitle').textContent = project.title;
  document.getElementById('pageMeta').textContent =
    servicesLabel() + ' · ' + (project.briefing_status === 'submitted' ? 'Briefing enviado' : 'Preencher briefing');

  if (project.briefing_status === 'submitted') {
    document.getElementById('submittedBanner').style.display = 'flex';
    const b = document.getElementById('btnSubmit'); b.disabled = true; b.textContent = 'Já enviado';
  }

  units.forEach(u => unitIdx[u.key] = u);
  renderSidebar(); renderSections(); updateProgress();
}

function servicesLabel() { return services.map(s => window.BRIEFING_SERVICE_LABELS[s] || s).join(' · ') || 'Evento'; }

function buildUnits() {
  units = [];
  units.push({ key: 'general', kind: 'general', title: 'Dados do evento', icon: 'calendar', fields: window.getGeneralFields(), readonly: false });
  services.forEach(svc => {
    const lbl = window.BRIEFING_SERVICE_LABELS[svc] || svc;
    window.getProjectSections(svc).forEach((sec, i) => units.push({
      key: 'p_' + svc + '_' + i, kind: 'service', service: svc, group: lbl + ' — campanha',
      title: sec.title, icon: sec.icon, alert: sec.alert, hint: sec.hint, fields: sec.fields, readonly: false,
    }));
    window.getBaseSections(svc).forEach((sec, i) => units.push({
      key: 'a_' + svc + '_' + i, kind: 'access', service: svc, group: lbl + ' — acessos (já cadastrados)',
      title: sec.title, icon: 'lock', fields: sec.fields, readonly: true,
    }));
  });
}

// ── ícones ───────────────────────────────────────────────────
const SVG_ICONS = {
  user:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
  target:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`,
  cpu:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/></svg>`,
  layers:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`,
  'bar-chart':`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
  calendar:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
  'credit-card':`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>`,
  lock:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
  warn:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  info:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`,
};
function icon(n){ return SVG_ICONS[n] || SVG_ICONS.cpu; }
function escHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Campos curtos do bloco geral ganham grid 2-col; o resto ocupa a linha toda.
const GENERAL_HALF = new Set(['event_date','traffic_start','total_budget','desired_domain']);

// ── render ───────────────────────────────────────────────────
function renderSidebar(){
  document.getElementById('sidebarNav').innerHTML = units.map((u,i) => `
    <div class="nav-item ${i===0?'active':''} ${u.readonly?'access':''}" id="nav-${i}" onclick="scrollToUnit(${i})">
      <div class="nav-icon">${icon(u.icon)}</div>
      <span class="nav-label">${escHtml(u.title)}</span>
    </div>`).join('');
}

function renderSections(){
  let lastGroup = null, html = '';
  units.forEach((u,i) => {
    if (u.group && u.group !== lastGroup) { html += `<div class="grp-label">${escHtml(u.group)}</div>`; lastGroup = u.group; }
    const isGeneral = u.kind === 'general';
    const fieldsHtml = u.fields.map(f => renderField(u, f)).join('');
    html += `
      <div class="section-panel ${u.readonly?'access':''}" id="unit-${i}">
        <div class="section-panel-header"><div class="section-icon">${icon(u.icon)}</div><div class="section-title">${escHtml(u.title)}</div>
          ${u.readonly?'<span class="section-tag">Somente leitura</span>':''}</div>
        ${u.alert ? `<div class="section-notice warn">${icon('warn')} <span>${escHtml(u.alert)}</span></div>` : ''}
        ${u.hint ? `<div class="section-notice info">${icon('info')} <span>${escHtml(u.hint)}</span></div>` : ''}
        ${u.readonly && (!u.fields || !u.fields.length) ? `<div class="field-hint">Nenhum acesso cadastrado para este serviço.</div>` : ''}
        ${isGeneral ? `<div class="field-grid">${fieldsHtml}</div>` : fieldsHtml}
      </div>`;
  });
  document.getElementById('sections').innerHTML = html;
  units.forEach(u => u.fields.forEach(f => applyDependent(u, f)));
}

function renderField(u, f){
  const PR = { red:'Obrigatório', yellow:'Importante', green:'Recomendado' };
  const hidden = f.dependsOn ? 'style="display:none"' : '';
  const cur = readVal(u, f.id);
  const ro  = u.readonly;
  const dom = u.key + '-' + f.id;
  // no bloco geral, campos curtos ocupam meia linha; demais e textos, linha cheia
  const full = (u.kind === 'general' && !GENERAL_HALF.has(f.id)) ? 'full' : (u.kind === 'general' ? '' : 'full');
  let input = '';
  if (f.type === 'boolean') {
    if (ro) input = `<input class="field-input" readonly tabindex="-1" value="${cur===true?'Sim':cur===false?'Não':'—'}" />`;
    else {
      const y = cur===true?'active':'', n = cur===false?'active':'';
      input = `<div class="toggle-group"><button class="toggle-btn ${y}" onclick="setBool('${u.key}','${f.id}',true)">Sim</button>
        <button class="toggle-btn ${n}" onclick="setBool('${u.key}','${f.id}',false)">Não</button></div>`;
    }
  } else if (f.type === 'select') {
    if (ro) input = `<input class="field-input" readonly tabindex="-1" value="${escHtml(cur||'—')}" />`;
    else {
      const opts = (f.options||[]).map(o => `<option value="${escHtml(o)}" ${cur===o?'selected':''}>${escHtml(o)}</option>`).join('');
      input = `<select class="field-input" onchange="setVal('${u.key}','${f.id}',this.value)"><option value="">— Selecione —</option>${opts}</select>`;
    }
  } else {
    const t = f.type==='number'?'number':f.type==='url'?'url':f.type==='date'?'date':f.type==='email'?'email':'text';
    const roAttr = ro ? 'readonly tabindex="-1"' : `oninput="setVal('${u.key}','${f.id}',this.value)"`;
    input = `<input class="field-input" id="fld-${dom}" type="${t}" value="${escHtml(cur!=null?String(cur):'')}" placeholder="${escHtml(f.placeholder||'')}" ${roAttr} />`;
  }
  return `<div class="field-row ${full}" id="row-${dom}" ${hidden}>
    <div class="field-top"><div class="priority-dot ${f.priority}"></div><span class="field-label-text">${escHtml(f.label)}</span>
      ${ro?'<span class="readonly-badge">Do Briefing Básico</span>':`<span class="priority-tag ${f.priority}">${PR[f.priority]||''}</span>`}</div>
    ${f.hint ? `<div class="field-hint">${escHtml(f.hint)}</div>` : ''}
    ${input}
    <div class="field-error" id="err-${dom}">Campo obrigatório</div></div>`;
}

function setVal(key, fid, value){
  const u = unitIdx[key]; const f = u.fields.find(x => x.id===fid);
  writeVal(u, fid, f && f.type==='number' ? (value===''?null:Number(value)) : value);
  clearErr(key, fid); updateDependents(u, fid); updateProgress(); scheduleSave();
}
function setBool(key, fid, value){
  const u = unitIdx[key]; writeVal(u, fid, value);
  document.querySelectorAll(`#row-${key}-${fid} .toggle-btn`).forEach((b,i)=>b.classList.toggle('active', i===0?value===true:value===false));
  clearErr(key, fid); updateDependents(u, fid); updateProgress(); scheduleSave();
}
function updateDependents(u, changedId){
  u.fields.filter(f => f.dependsOn && f.dependsOn.field===changedId).forEach(f => {
    const row = document.getElementById(`row-${u.key}-${f.id}`); if (!row) return;
    const show = readVal(u, changedId) === f.dependsOn.value;
    row.style.display = show ? '' : 'none';
    if (!show) writeVal(u, f.id, null);
  });
}
function applyDependent(u, f){
  if (!f.dependsOn) return;
  const row = document.getElementById(`row-${u.key}-${f.id}`);
  if (row) row.style.display = (readVal(u, f.dependsOn.field) === f.dependsOn.value) ? '' : 'none';
}
function clearErr(key, fid){
  const e = document.getElementById(`err-${key}-${fid}`); if (e) e.style.display='none';
  const i = document.getElementById(`fld-${key}-${fid}`); if (i) i.classList.remove('error');
}

function updateProgress(){
  let total = 0, filled = 0;
  units.filter(u => !u.readonly).forEach(u => {
    u.fields.filter(f => f.priority==='red').forEach(f => {
      if (f.dependsOn && readVal(u, f.dependsOn.field) !== f.dependsOn.value) return;
      total++;
      const v = readVal(u, f.id);
      if (!(v===null || v===undefined || v==='')) filled++;
    });
  });
  const pct = total ? Math.round(filled/total*100) : 100;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressPct').textContent = pct+'%';
  units.forEach((u,i) => {
    if (u.readonly) return;
    const reds = u.fields.filter(f => f.priority==='red');
    const ok = reds.length>0 && reds.every(f => {
      if (f.dependsOn && readVal(u, f.dependsOn.field) !== f.dependsOn.value) return true;
      const v = readVal(u, f.id); return !(v===null||v===undefined||v==='');
    });
    const n = document.getElementById('nav-'+i); if (n) n.classList.toggle('done', ok);
  });
}

function scrollToUnit(i){
  document.querySelectorAll('.nav-item').forEach((el,j)=>el.classList.toggle('active', i===j));
  const el = document.getElementById('unit-'+i); if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
}

// ── save / submit ────────────────────────────────────────────
function setSave(cls,msg){ const el=document.getElementById('saveStatus'); el.className='save-status '+cls; document.getElementById('saveStatusText').textContent=msg; }
function scheduleSave(){ clearTimeout(saveTimer); setSave('saving','Salvando...'); saveTimer=setTimeout(saveDraft,1200); }
async function saveDraft(){
  if (project.briefing_status === 'submitted') return;
  try {
    const { error } = await supabase.rpc('save_project_briefing', { p_project_id: PROJECT_ID, p_answers: { general: model.general, services: model.services } });
    if (error) throw error;
    setSave('saved','Rascunho salvo ✓'); setTimeout(()=>setSave('','—'),3000);
  } catch(e){ setSave('','Erro ao salvar'); }
}

async function submitBriefing(){
  const r = window.validateProjectBriefing(services, { general: model.general, services: model.services });
  const missing = r.missing.map(m => {
    let u, f;
    if (m.scope === 'general') { u = unitIdx['general']; f = u.fields.find(x=>x.id===m.field); }
    else { u = units.find(x => x.kind==='service' && x.service===m.scope && x.fields.some(y=>y.id===m.field)); f = u && u.fields.find(x=>x.id===m.field); }
    return { u, f, label: (f?f.label:m.field) };
  });
  if (missing.length) {
    const bar = document.getElementById('validationBar'); bar.style.display='block';
    bar.innerHTML = '<strong>⚠️ Preencha os campos obrigatórios (🔴) antes de enviar:</strong><ul>' +
      missing.map(m => {
        if (m.u && m.f) { const e=document.getElementById(`err-${m.u.key}-${m.f.id}`); if(e) e.style.display='block'; const i=document.getElementById(`fld-${m.u.key}-${m.f.id}`); if(i) i.classList.add('error'); }
        return `<li>${escHtml(m.label)}</li>`;
      }).join('') + '</ul>';
    bar.scrollIntoView({ behavior:'smooth', block:'start' });
    return;
  }
  document.getElementById('validationBar').style.display='none';
  const btn = document.getElementById('btnSubmit'); btn.disabled=true; btn.textContent='Enviando...';
  try {
    let { error } = await supabase.rpc('save_project_briefing', { p_project_id: PROJECT_ID, p_answers: { general: model.general, services: model.services } });
    if (!error) ({ error } = await supabase.rpc('submit_project_briefing', { p_project_id: PROJECT_ID }));
    if (error) throw error;
    project.briefing_status = 'submitted';
    document.getElementById('submittedBanner').style.display='flex';
    btn.textContent = 'Gerando PDF...';
    try { const blob = generatePDF(); btn.textContent='Enviando ao ClickUp...'; await attachPDF(blob); }
    catch(e){ console.warn('PDF/ClickUp:', e); }
    btn.textContent = 'Enviado ✓';
    setTimeout(()=>goBack(), 2500);
  } catch(err){
    btn.disabled=false; btn.textContent='Enviar para a Equipe';
    alert('Erro ao enviar: ' + (err.message || err));
  }
}

// ── PDF ──────────────────────────────────────────────────────
function displayVal(v){ return v===true?'Sim':v===false?'Não':(v==null?'':String(v)); }
function generatePDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const ORANGE=[242,151,37], DARK=[26,20,16], GRAY=[90,82,74], WHITE=[255,255,255];
  const pageW=210, pageH=297, mL=18, mR=18, cW=pageW-mL-mR; let y=0;
  function sf(s,st,c){ doc.setFontSize(s); doc.setFont('helvetica',st||'normal'); doc.setTextColor(...(c||DARK)); }
  function chk(n){ if (y+n>pageH-16){ doc.addPage(); y=20; } }
  doc.setFillColor(...ORANGE); doc.rect(0,0,pageW,48,'F');
  sf(9,'normal',WHITE); doc.text('GRUPO PARTICIPA · SERVIÇO DIAMANTE', mL, 12);
  sf(22,'bold',WHITE); doc.text('BRIEFING DO PROJETO', mL, 27);
  sf(11,'normal',WHITE); doc.text(servicesLabel(), mL, 37);
  y=58;
  sf(9,'bold',GRAY); doc.text('EVENTO', mL, y); y+=5;
  sf(13,'bold',DARK); const tl=doc.splitTextToSize(project.title,cW); doc.text(tl,mL,y); y+=tl.length*6+8;
  units.forEach(u => {
    const filled = u.fields.filter(f => { const v=readVal(u,f.id); return !(v===null||v===undefined||v===''); });
    if (!filled.length) return;
    chk(16);
    doc.setFillColor(248,245,240); doc.roundedRect(mL,y,cW,9,1,1,'F');
    sf(10,'bold',DARK); doc.text((u.group?u.group+' · ':'')+u.title, mL+4, y+6); y+=13;
    filled.forEach(f => {
      chk(12);
      sf(8,'bold',GRAY); doc.text(f.label, mL, y+4); y+=6;
      sf(9,'normal',DARK); const lines=doc.splitTextToSize(displayVal(readVal(u,f.id)), cW); doc.text(lines, mL, y+3); y+=lines.length*5+4;
      doc.setDrawColor(240,235,225); doc.setLineWidth(0.2); doc.line(mL,y,pageW-mR,y); y+=4;
    });
    y+=4;
  });
  const pc=doc.getNumberOfPages();
  for (let p=1;p<=pc;p++){ doc.setPage(p); doc.setFillColor(...ORANGE); doc.rect(0,pageH-10,pageW,10,'F'); sf(7,'normal',WHITE); doc.text('Grupo Participa · Serviço Diamante · Documento confidencial', mL, pageH-4); doc.text('Pág. '+p+'/'+pc, pageW-mR-15, pageH-4); }
  return doc.output('blob');
}
async function attachPDF(blob){
  const { data:{ session } } = await supabase.auth.getSession();
  const jwt = session && session.access_token; if (!jwt) throw new Error('Sessão expirada.');
  const form = new FormData();
  form.append('project_id', PROJECT_ID);
  form.append('pdf', blob, 'Briefing.pdf');
  const res = await fetch('/api/briefing-to-clickup.php', { method:'POST', headers:{ 'Authorization':'Bearer '+jwt }, body:form });
  const d = await res.json(); if (!d.ok) throw new Error(d.error || 'Erro ClickUp'); return d;
}

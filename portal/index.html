<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Diamantes — Portal</title>
  <script>
    // Bridge: /{slug}/ → /portal/?slug=X → /portal/dashboard.html?slug=X
    (function () {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      const dest = 'dashboard.html' + (slug ? ('?slug=' + encodeURIComponent(slug)) : '');
      window.location.replace(dest);
    })();
  </script>
</head>
<body></body>
</html>

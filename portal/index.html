<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Diamantes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080808; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .gp-loading {
      color: rgba(255,255,255,0.6);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .gp-spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(242,151,37,0.2);
      border-top-color: #F29725;
      border-radius: 50%;
      animation: gp-spin 0.7s linear infinite;
    }
    @keyframes gp-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="gp-loading" id="gpLoadingScreen">
    <div class="gp-spinner"></div>
    <span>Carregando portal...</span>
  </div>

  <!--
    portal/index.html — PHP-less client-side portal renderer (Fase Supabase rewrite).

    Flow:
      1. Load supabase-js + supabase-config + portal-auth-v2
      2. PortalAuth.init() → validate session
      3. Authz: client → own slug only; admin → any slug
      4. Fetch portal config from portal.clients via Supabase RLS
      5. Fetch template.html as text, replace {{PLACEHOLDERS}} with real data
      6. Inject rendered HTML into current document (styles + body)
      7. Execute template scripts that define global vars (CLIENTE_NAME, etc.)
      8. Load portal-contracts.js + insights-bootstrap.js (ESM)
  -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js" integrity="sha384-2zrRDgDHSYB/GN3nFW3fsZXoxEhKIr3N2h63Tc6DEOB9JJdFIu8xMJT2Cph/gBil" crossorigin="anonymous"></script>
  <script src="../assets/js/supabase-config.js"></script>
  <script src="../assets/js/supabase-i18n.js"></script>
  <script src="../assets/js/portal-auth-v2.js"></script>
  <script src="../assets/js/portal-api.js"></script>
  <script>
  (async function () {
    'use strict';

    // ── helpers ────────────────────────────────────────────────────────────────
    function redirect(url) { window.location.replace(url); }

    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function buildObjectLiteral(obj) {
      // Replicates gp_portal_object_literal() — {key: null} or {key: value} on multiple lines.
      if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return '{}';
      const entries = Object.entries(obj);
      if (!entries.length) return '{}';
      const lines = entries.map(([k, v]) => {
        const key = JSON.stringify(k);
        const val = v === null ? 'null' : JSON.stringify(v);
        return '    ' + key + ': ' + val;
      });
      return '{\r\n' + lines.join(',\r\n') + '\r\n}';
    }

    function buildOptionsHtml(keys, hasIndentQuirk) {
      const firstIndent = hasIndentQuirk ? '                            ' : '              ';
      const restIndent  = '              ';
      let html = '';
      let first = true;
      for (const key of keys) {
        const esc = escHtml(key);
        const indent = first ? firstIndent : restIndent;
        first = false;
        html += indent + '<div class="option" data-value="' + esc + '">' + esc + '</div>\r\n';
      }
      return html.replace(/\r\n$/, '');
    }

    // ── 1. Auth check ───────────────────────────────────────────────────────────
    let sessionUser;
    try {
      sessionUser = await window.PortalAuth.init();
    } catch (e) {
      redirect('../index.html');
      return;
    }

    if (!sessionUser) {
      redirect('../index.html');
      return;
    }

    // ── 2. Slug resolution & authz ──────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const requestedSlug = (params.get('slug') || '').trim();

    // Validate slug format (same regex as PHP: /^[a-z][a-z0-9-]+$/)
    if (requestedSlug && !/^[a-z][a-z0-9-]+$/.test(requestedSlug)) {
      redirect('../index.html');
      return;
    }

    const isAdmin = sessionUser.role === 'admin';
    let effectiveSlug;

    if (isAdmin) {
      effectiveSlug = requestedSlug || sessionUser.clientSlug || '';
    } else {
      if (sessionUser.status !== 'approved') {
        redirect('../index.html');
        return;
      }
      if (requestedSlug && requestedSlug !== sessionUser.clientSlug) {
        // IDOR: client trying to access another portal → back to login
        redirect('../index.html');
        return;
      }
      effectiveSlug = sessionUser.clientSlug || requestedSlug || '';
    }

    if (!effectiveSlug) {
      redirect('../index.html');
      return;
    }

    // ── 3. Fetch portal config from Supabase ────────────────────────────────────
    const supabase = window.getSupabaseClient();
    const { data: clientData, error: clientError } = await supabase
      .from('clients')
      .select('slug,display_name,cliente_name_var,cliente_task_id,cf_tipos,assignee_ids,auto_map,css_card_bg,dropdown_indent_quirk')
      .eq('slug', effectiveSlug)
      .maybeSingle();

    if (clientError || !clientData) {
      document.getElementById('gpLoadingScreen').innerHTML =
        '<span style="color:#ef4444">Portal não encontrado: ' + escHtml(effectiveSlug) + '</span>';
      return;
    }

    // ── 4. Build placeholder values ─────────────────────────────────────────────
    const displayName   = escHtml(clientData.display_name || '');
    const clientNameVar = escHtml(clientData.cliente_name_var || '');
    const clientTaskId  = escHtml(clientData.cliente_task_id || '');

    const cfTipos      = clientData.cf_tipos && typeof clientData.cf_tipos === 'object'
      ? clientData.cf_tipos
      : {};
    const assigneeIds  = clientData.assignee_ids && typeof clientData.assignee_ids === 'object'
      ? clientData.assignee_ids
      : {};
    const autoMap      = clientData.auto_map && typeof clientData.auto_map === 'object'
      ? clientData.auto_map
      : {};

    // cf_tipos stored as {key: null} object OR as array — normalise
    let cfTiposObj = {};
    if (Array.isArray(cfTipos)) {
      for (const t of cfTipos) cfTiposObj[String(t)] = null;
    } else {
      cfTiposObj = cfTipos;
    }

    const hasIndentQuirk = clientData.dropdown_indent_quirk !== false;

    const cfTiposJson        = buildObjectLiteral(cfTiposObj);
    const assigneeIdsJson    = buildObjectLiteral(assigneeIds);
    const autoMapJson        = buildObjectLiteral(autoMap);
    const tipoOptionsHtml    = buildOptionsHtml(Object.keys(cfTiposObj), hasIndentQuirk);
    const prestadorOptions   = buildOptionsHtml(Object.keys(assigneeIds), hasIndentQuirk);

    const cssCardBgRaw = String(clientData.css_card_bg || '#ffffff').trim();
    const cssCardBg    = /^#[0-9a-fA-F]{3,6}$/.test(cssCardBgRaw) ? cssCardBgRaw : '#ffffff';

    // ── 5. Fetch template.html ──────────────────────────────────────────────────
    let tplText;
    try {
      const resp = await fetch('./template.html', { cache: 'no-cache' });
      if (!resp.ok) throw new Error('template.html ' + resp.status);
      tplText = await resp.text();
    } catch (e) {
      document.getElementById('gpLoadingScreen').innerHTML =
        '<span style="color:#ef4444">Erro ao carregar template: ' + escHtml(e.message) + '</span>';
      return;
    }

    // ── 6. Replace placeholders ─────────────────────────────────────────────────
    // The template has {{PLACEHOLDERS}} that PHP used to fill. We replicate exactly.
    tplText = tplText
      .replaceAll('{{DISPLAY_NAME}}',           displayName)
      .replaceAll('{{CLIENTE_NAME_VAR}}',        clientNameVar)
      .replaceAll('{{CLIENTE_TASK_ID}}',         clientTaskId)
      .replaceAll('{{CF_TIPOS_JSON}}',           cfTiposJson)
      .replaceAll('{{ASSIGNEE_IDS_JSON}}',       assigneeIdsJson)
      .replaceAll('{{AUTO_MAP_JSON}}',           autoMapJson)
      .replaceAll('{{TIPO_OPTIONS_HTML}}',       tipoOptionsHtml)
      .replaceAll('{{PRESTADOR_OPTIONS_HTML}}',  prestadorOptions)
      .replaceAll('{{CSS_CARD_BG}}',             cssCardBg);

    // ── 7. Parse and inject rendered template into the live document ─────────────
    //
    // Strategy: replace the current document using document.open/write/close.
    // This is synchronous and executes the template's inline <script> blocks
    // (which set CLIENTE_NAME, CF_TIPO_OPTIONS, ASSIGNEE_IDS, etc.).
    //
    // We MUST replace the <script src="../portal-auth.js"> and <script src="../auth-guard.js">
    // tags in the template HEAD so they don't re-load conflicting code.
    // portal-auth-v2 is already loaded and sets window.PortalAuth — the template
    // scripts only read window.PortalAuth (don't call auth.init again).
    // auth-guard.js is also already running (window.PortalAuth is set).
    //
    // Removemos APENAS portal-auth.js legado (não compat com Supabase).
    // auth-guard.js permanece — é ele quem injeta o shell com botão "Sair"
    // no canto superior direito do portal cliente.
    tplText = tplText
      .replace(/<script\s[^>]*src=["'][^"']*portal-auth\.js["'][^>]*>\s*<\/script>/gi, '');

    // Also remove the old supabase/portal-auth-v2 scripts if template ever gets them,
    // to avoid double-loading:
    tplText = tplText
      .replace(/<script\s[^>]*src=["'][^"']*supabase\.min\.js["'][^>]*>\s*<\/script>/gi, '')
      .replace(/<script\s[^>]*src=["'][^"']*supabase-config\.js["'][^>]*>\s*<\/script>/gi, '')
      .replace(/<script\s[^>]*src=["'][^"']*portal-auth-v2\.js["'][^>]*>\s*<\/script>/gi, '');

    document.open();
    document.write(tplText);
    document.close();

    // After document.write, this script context continues (IIFE is done).
    // The browser will execute scripts in the new document in order:
    // 1. Inline <script> block with CLIENTE_NAME, CF_TIPO_OPTIONS, etc.  ← executes
    // 2. <script src="../portal-contracts.js">  ← loads relative to /portal/
    // 3. <script type="module" src="assets/js/insights-bootstrap.js">  ← ESM module
  })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas demandas — Diamantes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fdfaf5;
      --bg-soft: #fffdf9;
      --surface: #ffffff;
      --border: #f1ebe0;
      --border-strong: #e6dfd0;
      --text: #1a1410;
      --text-secondary: #5b524a;
      --muted: #9c8f81;
      --accent: #F29725;
      --accent-soft: #fff4e3;
      --accent-strong: #d97e0f;
      --success: #16a34a;
      --warning: #f59e0b;
      --danger: #ef4444;

      --shadow-sm: 0 1px 2px rgba(85, 60, 30, 0.04);
      --shadow-md: 0 4px 16px rgba(85, 60, 30, 0.06);
      --shadow-lg: 0 18px 40px rgba(85, 60, 30, 0.10);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 90% -10%, rgba(242,151,37,0.10), transparent 60%),
        radial-gradient(900px 500px at -10% 30%, rgba(242,151,37,0.06), transparent 60%),
        var(--bg);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
    }
    button { font-family: inherit; cursor: pointer; }
    input, textarea { font-family: inherit; }

    /* ============ TOPBAR ============ */
    .topbar {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px 28px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 20px;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.05rem; letter-spacing: -0.01em; }
    .brand-mark { width: 32px; height: 32px; border-radius: 9px; background: linear-gradient(135deg, var(--accent), var(--accent-strong)); display: grid; place-items: center; color: #fff; }

    .topnav {
      display: flex; gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px;
      box-shadow: var(--shadow-sm);
    }
    .topnav a {
      padding: 8px 18px;
      border-radius: 999px;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      transition: background 0.15s, color 0.15s;
    }
    .topnav a:hover { background: var(--bg-soft); color: var(--text); }
    .topnav a.active { background: var(--text); color: #fff; }

    .user-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 14px 6px 6px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
      transition: border-color 0.15s;
    }
    .user-chip:hover { border-color: var(--accent); }
    .user-chip svg.caret { width: 14px; height: 14px; color: var(--muted); margin-left: 2px; transition: transform 0.15s; }
    .user-chip.open svg.caret { transform: rotate(180deg); }
    .user-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 200px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow-lg);
      padding: 6px;
      z-index: 80;
      display: none;
    }
    .user-menu.open { display: block; animation: fadeMenu 0.12s ease-out; }
    @keyframes fadeMenu { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .user-menu .um-section { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .user-menu .um-name { font-weight: 700; font-size: 0.88rem; }
    .user-menu .um-email { font-size: 0.74rem; color: var(--muted); margin-top: 2px; }
    .user-menu a, .user-menu button {
      width: 100%;
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      border-radius: 9px;
      font-size: 0.86rem;
      font-weight: 500;
      color: var(--text-secondary);
      background: transparent;
      border: none;
      cursor: pointer;
      text-decoration: none;
      text-align: left;
    }
    .user-menu a:hover, .user-menu button:hover { background: var(--bg-soft); color: var(--text); }
    .user-menu button.danger:hover { background: rgba(239,68,68,0.08); color: var(--danger); }
    .user-menu svg { width: 16px; height: 16px; flex-shrink: 0; }
    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fcd9a5, var(--accent));
      display: grid; place-items: center;
      color: #fff; font-weight: 700; font-size: 0.78rem;
      flex-shrink: 0;
    }
    .user-chip-name { font-weight: 600; font-size: 0.85rem; }

    /* ============ CONTAINER ============ */
    .container {
      max-width: 1320px;
      margin: 0 auto;
      padding: 8px 28px 64px;
    }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin: 16px 0 24px;
    }
    .page-head h1 {
      margin: 0; font-size: 1.7rem; font-weight: 800; letter-spacing: -0.02em;
    }
    .page-head .sub {
      margin: 6px 0 0; color: var(--text-secondary); font-size: 0.95rem;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 20px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 0.92rem;
      border: none;
      box-shadow: 0 8px 20px rgba(242,151,37,0.28);
    }
    .btn-primary:hover { background: var(--accent-strong); }

    /* ============ LAYOUT 3 COLUNAS ============ */
    .layout {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr) 320px;
      gap: 18px;
      align-items: start;
    }
    @media (max-width: 1180px) {
      .layout { grid-template-columns: 320px minmax(0, 1fr); }
      .detail-pane { display: none; }
    }
    @media (max-width: 880px) {
      .layout { grid-template-columns: 1fr; }
      .list-pane { display: none; }
      .list-pane.visible-mobile { display: flex; }
    }

    .pane {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 180px);
      overflow: hidden;
    }

    /* ============ LISTA ESQUERDA ============ */
    .list-pane { }
    .list-head {
      padding: 16px 16px 8px;
    }
    .filter-tabs {
      display: flex; gap: 4px;
      background: var(--bg-soft);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 12px;
      overflow-x: auto;
    }
    .filter-tabs button {
      flex: 1; min-width: 0;
      padding: 8px 10px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.76rem;
      color: var(--text-secondary);
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .filter-tabs button.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }
    .filter-tabs button.urgent.active {
      background: var(--accent-soft);
      color: var(--accent-strong);
    }
    .filter-tabs .count {
      display: inline-block;
      margin-left: 4px;
      background: var(--border);
      color: var(--text-secondary);
      padding: 1px 6px;
      border-radius: 8px;
      font-size: 0.66rem;
    }
    .filter-tabs button.active .count {
      background: var(--text);
      color: #fff;
    }
    .filter-tabs button.urgent.active .count {
      background: var(--accent);
      color: #fff;
    }

    .search-wrap { position: relative; margin-bottom: 8px; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--muted); }
    .search-wrap input {
      width: 100%;
      padding: 10px 36px;
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      background: var(--bg-soft);
      font-size: 0.88rem;
      color: var(--text);
    }
    .search-wrap input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(242,151,37,0.14);
      background: #fff;
    }
    .search-wrap button.filter {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      width: 28px; height: 28px;
      border: none; background: transparent;
      border-radius: 8px;
      display: grid; place-items: center;
      color: var(--muted);
    }

    .list-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 12px;
    }
    .list-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      padding: 12px;
      margin: 4px 0;
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid transparent;
      align-items: start;
      transition: background 0.12s, border-color 0.12s;
    }
    .list-item:hover { background: var(--bg-soft); }
    .list-item.active {
      background: var(--accent-soft);
      border-color: rgba(242,151,37,0.28);
    }
    .list-item.awaiting {
      border-left: 3px solid var(--accent);
    }
    .list-icon {
      width: 34px; height: 34px;
      border-radius: 10px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .list-icon svg { width: 16px; height: 16px; }
    .list-icon.in_progress { background: #dbeafe; color: #1d4ed8; }
    .list-icon.review      { background: #fff4d6; color: #b45309; }
    .list-icon.awaiting    { background: var(--accent-soft); color: var(--accent-strong); }
    .list-icon.done        { background: #e7f7ee; color: #15803d; }
    .list-icon.late        { background: #fee2e2; color: #b91c1c; }

    .list-body { min-width: 0; }
    .list-title { font-weight: 600; font-size: 0.88rem; line-height: 1.3; }
    .list-meta {
      margin-top: 4px;
      font-size: 0.72rem;
      color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .list-unread {
      align-self: center;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .list-item:not(.unread) .list-unread { visibility: hidden; }

    /* ============ CHAT CENTRO ============ */
    .chat-pane { }
    .chat-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .chat-head-info h2 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .chat-head-info .meta {
      margin-top: 4px;
      font-size: 0.78rem;
      color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .chat-head-info .badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-right: 8px;
    }
    .badge.in_progress { background: #dbeafe; color: #1d4ed8; }
    .badge.review      { background: #fff4d6; color: #b45309; }
    .badge.awaiting    { background: var(--accent-soft); color: var(--accent-strong); }
    .badge.done        { background: #e7f7ee; color: #15803d; }
    .chat-head-actions a {
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--accent-strong);
      text-decoration: none;
    }
    .chat-tabs {
      padding: 8px 20px 0;
      display: flex; gap: 6px;
      border-bottom: 1px solid var(--border);
    }
    .chat-tabs button {
      padding: 10px 14px;
      border: none; background: transparent;
      font-weight: 600;
      font-size: 0.86rem;
      color: var(--text-secondary);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .chat-tabs button.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }
    .chat-tabs button .count {
      display: inline-block;
      margin-left: 4px;
      background: var(--border);
      color: var(--text-secondary);
      padding: 1px 6px;
      border-radius: 8px;
      font-size: 0.66rem;
    }

    .chat-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 22px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg-day {
      display: flex; align-items: center; gap: 10px;
      margin: 6px 0 4px;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .msg-day::before, .msg-day::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .msg {
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      max-width: 78%;
    }
    .msg .avatar {
      width: 32px; height: 32px;
      font-size: 0.7rem;
      margin-top: 2px;
    }
    .msg.mine {
      margin-left: auto;
      grid-template-columns: 1fr 32px;
    }
    .msg.mine .avatar { order: 2; }
    .msg-bubble {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 0.9rem;
      line-height: 1.45;
    }
    .msg.mine .msg-bubble {
      background: var(--accent-soft);
      border-color: rgba(242,151,37,0.28);
      border-top-right-radius: 4px;
    }
    .msg-bubble:not(.mine) { border-top-left-radius: 4px; }

    .msg-author {
      font-size: 0.74rem;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 600;
    }
    .msg-author .role {
      color: var(--accent-strong);
      font-weight: 700;
    }
    .msg-time {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .msg-attachment {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.7);
      border: 1px solid var(--border);
    }
    .msg-attachment .file-ico {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      display: grid; place-items: center;
    }
    .msg-attachment .file-ico svg { width: 16px; height: 16px; }
    .msg-attachment .file-info { flex: 1; min-width: 0; }
    .msg-attachment .file-name { font-weight: 600; font-size: 0.84rem; }
    .msg-attachment .file-size { font-size: 0.72rem; color: var(--muted); }
    .msg-attachment .file-dl {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text-secondary);
      display: grid; place-items: center;
    }
    .msg-attachment .file-dl svg { width: 14px; height: 14px; }

    .chat-composer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .composer-wrap {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 8px 8px 8px 14px;
      background: var(--bg-soft);
      border: 1px solid var(--border-strong);
      border-radius: 14px;
    }
    .composer-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(242,151,37,0.14);
      background: #fff;
    }
    .composer-wrap textarea {
      flex: 1;
      border: none;
      background: transparent;
      resize: none;
      font-size: 0.92rem;
      max-height: 140px;
      min-height: 22px;
      line-height: 1.4;
      padding: 6px 0;
      outline: none;
    }
    .composer-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      display: grid; place-items: center;
      transition: background 0.15s;
    }
    .composer-btn.ghost {
      background: transparent;
      color: var(--muted);
    }
    .composer-btn.ghost:hover { background: var(--bg-soft); color: var(--text); }
    .composer-btn.send {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px rgba(242,151,37,0.32);
    }
    .composer-btn.send:hover { background: var(--accent-strong); }
    .composer-btn svg { width: 16px; height: 16px; }

    /* ============ DETALHES DIREITA ============ */
    .detail-pane {
      max-height: calc(100vh - 180px);
      overflow-y: auto;
    }
    .detail-section {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }
    .detail-section:last-child { border-bottom: none; }
    .detail-section h3 {
      margin: 0 0 12px;
      font-size: 0.74rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .detail-section h3 .small {
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      color: var(--muted);
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 7px 0;
      font-size: 0.86rem;
      border-bottom: 1px dashed var(--border);
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .lbl { color: var(--text-secondary); }
    .info-row .val { font-weight: 600; }
    .info-row .val.due-soon { color: var(--warning); }
    .info-row .val.late { color: var(--danger); }
    .info-row .val.on-time { color: var(--success); }

    /* Etapas (steps) */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
    }
    .steps::before {
      content: '';
      position: absolute;
      left: 9px; top: 14px; bottom: 14px;
      width: 2px;
      background: var(--border);
    }
    .step {
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 12px;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }
    .step .dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border-strong);
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .step.done .dot {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }
    .step.done .dot svg { width: 10px; height: 10px; }
    .step.current .dot {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(242,151,37,0.20);
    }
    .step-info { padding-top: 1px; }
    .step-title { font-weight: 600; font-size: 0.86rem; }
    .step-when { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .step.current .step-title { color: var(--accent-strong); }

    /* Anexos */
    .attachments {
      display: flex; flex-direction: column; gap: 8px;
    }
    .attach-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: 10px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
    }
    .attach-ico {
      width: 34px; height: 34px;
      border-radius: 8px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .attach-ico.pdf  { background: #fee2e2; color: #b91c1c; }
    .attach-ico.img  { background: #dbeafe; color: #1d4ed8; }
    .attach-ico.fig  { background: #f1ecff; color: #6d28d9; }
    .attach-ico.zip  { background: #fff4d6; color: #b45309; }
    .attach-ico svg { width: 14px; height: 14px; }
    .attach-name { font-weight: 600; font-size: 0.84rem; }
    .attach-info { font-size: 0.72rem; color: var(--muted); }
    .attach-dl {
      width: 30px; height: 30px;
      border-radius: 8px;
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text-secondary);
      display: grid; place-items: center;
    }
    .attach-dl svg { width: 14px; height: 14px; }

    .team-mini {
      display: flex; flex-direction: column; gap: 8px;
    }
    .team-mini-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.86rem;
    }
    .team-mini-item .avatar { width: 30px; height: 30px; font-size: 0.66rem; }
    .team-mini-item .role { font-size: 0.72rem; color: var(--muted); }

    @media (max-width: 720px) {
      .topbar { flex-wrap: wrap; }
      .topnav { order: 3; width: 100%; justify-content: space-around; }
      .page-head { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l4 6-10 12L2 9z"/><path d="M11 3 8 9l4 12 4-12-3-6"/><path d="M2 9h20"/></svg>
      </div>
      Diamantes

    const STATUS_LABEL = {
      in_progress: 'Em andamento',
      review:      'Em revisão',
      awaiting:    'Aguardando você',
      done:        'Concluída',
      late:        'Atrasada',

    const state = { filter: 'all', search: '', currentId: DEMANDS[0].id };

    function counts() {
      return {
        all:  DEMANDS.length,
        in_progress: DEMANDS.filter(d => d.status === 'in_progress' || d.status === 'review').length,
        awaiting: DEMANDS.filter(d => d.status === 'awaiting').length,
        done: DEMANDS.filter(d => d.status === 'done').length,
      };
    }

    function renderTabs() {
      const c = counts();
      document.getElementById('cntAll').textContent   = c.all;
      document.getElementById('cntProg').textContent  = c.in_progress;
      document.getElementById('cntAwait').textContent = c.awaiting;
      document.getElementById('cntDone').textContent  = c.done;
    }

    function renderList() {
      const search = state.search.toLowerCase();
      let items = DEMANDS;
      if (state.filter === 'in_progress') items = items.filter(d => d.status === 'in_progress' || d.status === 'review');
      else if (state.filter === 'awaiting') items = items.filter(d => d.status === 'awaiting');
      else if (state.filter === 'done')     items = items.filter(d => d.status === 'done');
      if (search) items = items.filter(d => d.title.toLowerCase().includes(search) || d.category.toLowerCase().includes(search));

      const scroll = document.getElementById('listScroll');
      if (items.length === 0) {
        scroll.innerHTML = `<div style="padding:30px 16px; text-align:center; color:var(--muted); font-size:0.86rem;">Nenhuma demanda nessa categoria.</div>`;
        return;
      }
      scroll.innerHTML = items.map(d => `
        <div class="list-item ${d.id === state.currentId ? 'active' : ''} ${d.status === 'awaiting' ? 'awaiting' : ''} ${d.unread ? 'unread' : ''}" data-id="${d.id}">
          <div class="list-icon ${d.status}">${ICONS[d.icon] || ICONS.pen}</div>
          <div class="list-body">
            <div class="list-title">${d.title}</div>
            <div class="list-meta">
              <span>${d.category}</span>
              <span>•</span>
              <span>${d.dueLabel}</span>
            </div>
          </div>
          <div class="list-unread" title="Mensagem nova"></div>
        </div>
      `).join('');

      scroll.querySelectorAll('.list-item').forEach(el => {
        el.addEventListener('click', () => {
          state.currentId = el.dataset.id;
          // marca como lido visualmente
          const d = DEMANDS.find(x => x.id === state.currentId);
          if (d) d.unread = false;
          renderList();
          renderChat();
          renderDetails();
        });
      });
    }

    function renderChat() {
      const d = DEMANDS.find(x => x.id === state.currentId);
      if (!d) return;
      document.getElementById('chatTitle').textContent  = d.title;
      const badge = document.getElementById('chatBadge');
      badge.className = 'badge ' + d.status;
      badge.textContent = STATUS_LABEL[d.status] || d.status;
      document.getElementById('chatPeriod').textContent = d.period;
      document.getElementById('cntFiles').textContent   = d.attachments.length;

      const scroll = document.getElementById('chatScroll');
      const html = [];
      d.messages.forEach(grp => {
        html.push(`<div class="msg-day">${grp.day}</div>`);
        grp.items.forEach(m => {
          const av = `<div class="avatar" title="${m.author}">${m.initials || '??'}</div>`;
          const author = m.mine
            ? `<div class="msg-author">${m.author} <span style="color:var(--muted);font-weight:400">•</span> <span class="role">cliente</span></div>`
            : `<div class="msg-author">${m.author} <span style="color:var(--muted);font-weight:400">•</span> <span class="role">${m.role || 'equipe'}</span></div>`;
          const att = m.attachment ? `
            <div class="msg-attachment">
              <div class="file-ico">${FILE_ICONS.pdf}</div>
              <div class="file-info">
                <div class="file-name">${m.attachment.name}</div>
                <div class="file-size">${m.attachment.size}</div>
              </div>
              <button class="file-dl" title="Baixar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
            </div>
          ` : '';
          html.push(`
            <div class="msg ${m.mine ? 'mine' : ''}">
              ${av}
              <div>
                ${author}
                <div class="msg-bubble">
                  ${m.text}
                  ${att}
                </div>
                <div class="msg-time" style="text-align:${m.mine ? 'right' : 'left'}">${m.time}</div>
              </div>
            </div>
          `);
        });
      });
      scroll.innerHTML = html.join('');
      // Rola pro final
      scroll.scrollTop = scroll.scrollHeight;
    }

    function renderDetails() {
      const d = DEMANDS.find(x => x.id === state.currentId);
      if (!d) return;
      document.getElementById('infoStatus').innerHTML   = `<span class="badge ${d.status}">${STATUS_LABEL[d.status] || d.status}</span>`;
      document.getElementById('infoOpened').textContent = d.opened;
      const dueVal = document.getElementById('infoDue');
      dueVal.textContent = d.dueLabel;
      dueVal.className = 'val ' + (d.dueClass || '');
      document.getElementById('infoCategory').textContent = d.category;

      // Steps
      document.getElementById('stepsList').innerHTML = d.steps.map(s => `
        <div class="step ${s.state}">
          <div class="dot">
            ${s.state === 'done' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
          </div>
          <div class="step-info">
            <div class="step-title">${s.title}</div>
            <div class="step-when">${s.when}</div>
          </div>
        </div>
      `).join('');

      // Team mini
      document.getElementById('teamMiniCount').textContent = `${d.team.length} pessoa${d.team.length === 1 ? '' : 's'}`;
      document.getElementById('teamMini').innerHTML = d.team.map(m => `
        <div class="team-mini-item">
          <div class="avatar">${m.initials}</div>
          <div>
            <div style="font-weight:600;">${m.name}</div>
            <div class="role">${m.role}</div>
          </div>
        </div>
      `).join('');

      // Anexos
      document.getElementById('attachCount').textContent = `${d.attachments.length} arquivo${d.attachments.length === 1 ? '' : 's'}`;
      document.getElementById('attachList').innerHTML = d.attachments.map(a => `
        <div class="attach-item">
          <div class="attach-ico ${a.kind}">${FILE_ICONS[a.kind] || FILE_ICONS.pdf}</div>
          <div>
            <div class="attach-name">${a.name}</div>
            <div class="attach-info">${a.size}</div>
          </div>
          <button class="attach-dl" title="Baixar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
        </div>
      `).join('');
    }

    // ===== Filtros =====
    document.querySelectorAll('#filterTabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#filterTabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.filter = btn.dataset.filter;
        renderList();
      });
    });
    document.getElementById('searchInput').addEventListener('input', (e) => {
      state.search = e.target.value;
      renderList();
    });

    // ===== Composer =====
    const composer = document.getElementById('composer');
    composer.addEventListener('input', () => {
      composer.style.height = 'auto';
      composer.style.height = Math.min(composer.scrollHeight, 140) + 'px';
    });
    composer.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    document.querySelector('.composer-btn.send').addEventListener('click', sendMessage);

    function sendMessage() {
      const text = composer.value.trim();
      if (!text) return;
      const d = DEMANDS.find(x => x.id === state.currentId);
      if (!d) return;
      const today = d.messages.find(g => g.day === 'Hoje');
      const now = new Date();
      const time = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      const msg = { mine: true, author: 'Você', initials: 'AC', text, time };
      if (today) today.items.push(msg);
      else d.messages.push({ day: 'Hoje', items: [msg] });
      composer.value = '';
      composer.style.height = 'auto';
      renderChat();
    }

    function fillHeader(profile) {
      const first = (profile?.name || 'aluno').split(' ')[0];
      const ini = (profile?.name || '?').trim().split(/\s+/).slice(0,2).map(p=>p[0]).join('').toUpperCase();
      document.getElementById('navAvatar').textContent = ini;
      document.getElementById('navName').textContent = first;
    }

    function setupUserMenu(profile) {
      const chip = document.getElementById('userChip');
      const menu = document.getElementById('userMenu');
      if (!chip || !menu) return;
      document.getElementById('umName').textContent  = profile?.name || '—';
      document.getElementById('umEmail').textContent = profile?.email || '—';
      function close() { chip.classList.remove('open'); menu.classList.remove('open'); }
      chip.addEventListener('click', (e) => {
        if (e.target.closest('.user-menu')) return;
        const isOpen = menu.classList.contains('open');
        if (isOpen) close();
        else { chip.classList.add('open'); menu.classList.add('open'); }
      });
      document.addEventListener('click', (e) => { if (!chip.contains(e.target)) close(); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });
      document.getElementById('btnLogout').addEventListener('click', async () => {
        if (!confirm('Tem certeza que deseja sair?')) return;
        try { await PortalAPI.logout(); } catch (err) { console.error(err); }
      });
    }

    function bindPendingActions() {
      // Botão "Nova demanda" e link "Ver detalhes →"
      const btnNew = document.querySelector('.btn-primary');
      if (btnNew) {
        btnNew.addEventListener('click', () => {
          alert('A criação de novas demandas será liberada quando integrarmos com o ClickUp. Por enquanto, fale com sua equipe pelo chat.');
        });
      }
      const linkDetails = document.getElementById('chatViewDetails');
      if (linkDetails) {
        linkDetails.addEventListener('click', (e) => {
          e.preventDefault();
          alert('A página de detalhes completos será aberta quando ligarmos as demandas ao ClickUp.');
        });
      }
    }

    (async function init() {
      const profile = await PortalAPI.requireClient();
      if (!profile) return;
      fillHeader(profile);
      setupUserMenu(profile);
      bindPendingActions();
      renderTabs();
      renderList();
      renderChat();
      renderDetails();
    })();
  </script>
</body>
</html>

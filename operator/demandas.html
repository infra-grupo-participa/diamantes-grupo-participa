<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demandas — Operador Diamantes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f8fc; --surface: #ffffff; --border: #e9ecf3;
      --text: #14182a; --text-secondary: #4b5468; --muted: #8a92a5;
      --accent: #F29725; --accent-soft: #fff4e3; --accent-strong: #d97e0f;
      --indigo: #6366f1; --success: #16a34a; --warning: #f59e0b; --danger: #ef4444;
      --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
    }
    * { box-sizing:border-box; }
    html, body { margin:0; padding:0; height:100%; font-family:'Inter',sans-serif; color:var(--text); background:var(--bg); -webkit-font-smoothing:antialiased; font-size:14px; }
    button, input, select, textarea { font-family:inherit; } button { cursor:pointer; }
    a { text-decoration:none; color:inherit; }

    .app-shell { display:grid; grid-template-columns:244px 1fr; min-height:100vh; }

    .sidebar { background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:22px 14px; gap:22px; position:sticky; top:0; height:100vh; }
    .brand { display:flex; align-items:center; gap:10px; padding:4px 10px 14px; }
    .brand-mark { width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg,var(--accent),var(--accent-strong)); display:grid; place-items:center; color:#fff; }
    .brand-name { font-weight:700; font-size:1.02rem; }
    .nav { display:flex; flex-direction:column; gap:4px; flex:1; }
    .nav-item { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:12px; color:var(--text-secondary); font-weight:500; font-size:0.9rem; }
    .nav-item:hover { background:var(--bg); color:var(--text); }
    .nav-item.active { background:linear-gradient(135deg,var(--accent),var(--accent-strong)); color:#fff; font-weight:700; box-shadow:0 6px 14px rgba(242,151,37,.30); }
    .nav-item .ico { width:18px; height:18px; flex-shrink:0; }
    .sidebar-footer { border-top:1px solid var(--border); padding-top:14px; display:flex; flex-direction:column; gap:8px; }
    .user-pill { display:flex; align-items:center; gap:10px; padding:8px; border-radius:10px; }
    .avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#c7d2fe,var(--indigo)); display:grid; place-items:center; color:#fff; font-weight:700; font-size:0.8rem; flex-shrink:0; }
    .user-pill-name { font-weight:600; font-size:0.86rem; }
    .user-pill-role { font-size:0.72rem; color:var(--muted); }
    .logout-btn { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; border:none; background:transparent; color:var(--text-secondary); font-size:0.85rem; font-weight:500; }
    .logout-btn:hover { background:var(--bg); color:var(--danger); }
    .logout-btn svg { width:16px; height:16px; }

    .main { padding:30px 36px 56px; min-width:0; display:flex; flex-direction:column; gap:18px; }
    .page-head { display:flex; justify-content:space-between; align-items:flex-end; gap:16px; flex-wrap:wrap; }
    .page-head h1 { margin:0; font-size:1.5rem; font-weight:800; letter-spacing:-0.02em; }
    .page-head .sub { margin-top:4px; color:var(--text-secondary); font-size:0.92rem; }
    .search-box { display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:8px 12px; min-width:240px; }
    .search-box svg { width:16px; height:16px; color:var(--muted); }
    .search-box input { border:none; outline:none; background:transparent; flex:1; font-size:0.86rem; }

    .status-tabs { display:flex; gap:8px; flex-wrap:wrap; }
    .status-tab { display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); padding:10px 14px; border-radius:12px; cursor:pointer; font-size:0.85rem; font-weight:600; color:var(--text-secondary); }
    .status-tab.active { background:#fff; border-color:var(--accent); color:var(--accent-strong); box-shadow:0 6px 14px rgba(242,151,37,.15); }
    .status-tab .count { font-size:0.72rem; padding:2px 8px; border-radius:999px; background:var(--bg); color:var(--muted); font-weight:700; }
    .status-tab.active .count { background:var(--accent); color:#fff; }

    .work-area { display:grid; grid-template-columns:minmax(0,1fr) minmax(0,440px); gap:16px; align-items:start; }
    @media (max-width:1080px) { .work-area { grid-template-columns:1fr; } }

    .list-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:0; box-shadow:var(--shadow-sm); overflow:hidden; }
    .list-row { display:grid; grid-template-columns:42px 1fr auto auto; gap:14px; align-items:center; padding:14px 18px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; }
    .list-row:last-child { border-bottom:none; }
    .list-row:hover { background:#fafbff; }
    .list-row.active { background:var(--accent-soft); }
    .list-row .demand-icon { width:42px; height:42px; border-radius:12px; display:grid; place-items:center; }
    .demand-icon svg { width:18px; height:18px; }
    .demand-icon.design { background:#fbe2ec; color:#be185d; }
    .demand-icon.video  { background:#fee9e2; color:#b94512; }
    .demand-icon.web    { background:#e2ecfe; color:#1e3a8a; }
    .demand-icon.traf   { background:#e9faec; color:#15803d; }
    .demand-icon.auto   { background:#ede9fe; color:#5b21b6; }
    .demand-icon.social { background:#e0f2fe; color:#075985; }
    .row-info { min-width:0; }
    .row-title { font-weight:600; font-size:0.92rem; }
    .row-meta { font-size:0.76rem; color:var(--muted); margin-top:3px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .row-meta .sep { opacity:0.5; }
    .demand-tag { font-size:0.66rem; font-weight:700; padding:4px 10px; border-radius:999px; }
    .demand-tag.in_progress { background:#fff8db; color:#b45309; }
    .demand-tag.review      { background:#fbe2ec; color:#be185d; }
    .demand-tag.new         { background:#dcfce7; color:#15803d; }
    .demand-tag.done        { background:#eef0ff; color:#4338ca; }
    .row-date { font-size:0.78rem; color:var(--muted); white-space:nowrap; }

    .detail-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow-sm); display:flex; flex-direction:column; height:fit-content; max-height:calc(100vh - 60px); position:sticky; top:24px; overflow:hidden; }
    .detail-head { padding:18px; border-bottom:1px solid var(--border); display:flex; gap:12px; align-items:center; }
    .detail-head .demand-icon { width:42px; height:42px; flex-shrink:0; }
    .detail-head h3 { margin:0; font-size:0.98rem; font-weight:700; }
    .detail-head .who { font-size:0.76rem; color:var(--muted); margin-top:2px; }

    .detail-body { padding:16px 18px 8px; overflow-y:auto; flex-shrink:0; max-height:40vh; border-bottom:1px solid var(--border); }
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
    .info-grid .item { font-size:0.78rem; }
    .info-grid .item .k { color:var(--muted); font-weight:600; margin-bottom:3px; }
    .info-grid .item .v { color:var(--text); font-weight:600; }
    .desc-box { background:var(--bg); border-radius:10px; padding:12px; font-size:0.84rem; line-height:1.5; color:var(--text-secondary); }
    .status-actions { display:flex; flex-wrap:wrap; gap:8px; }
    .op-btn { background:linear-gradient(135deg,var(--accent),var(--accent-strong)); color:#fff; border:none; padding:8px 14px; border-radius:10px; font-weight:600; font-size:0.82rem; }
    .op-btn:disabled { opacity:0.5; cursor:wait; }

    .chat-scroll { padding:14px 18px; overflow-y:auto; flex:1; min-height:200px; display:flex; flex-direction:column; gap:10px; }
    .msg { display:flex; gap:8px; max-width:90%; }
    .msg .av { width:30px; height:30px; border-radius:50%; flex-shrink:0; display:grid; place-items:center; color:#fff; font-weight:700; font-size:0.66rem; }
    .msg-body { background:var(--bg); padding:10px 12px; border-radius:12px; min-width:0; }
    .msg-head { display:flex; gap:8px; align-items:baseline; font-size:0.72rem; color:var(--muted); margin-bottom:3px; }
    .msg-head .name { color:var(--text); font-weight:700; }
    .msg-text { font-size:0.86rem; line-height:1.45; white-space:pre-wrap; word-break:break-word; }
    .msg.me { align-self:flex-end; flex-direction:row-reverse; }
    .msg.me .msg-body { background:var(--accent-soft); }

    .chat-composer { padding:10px 14px 14px; border-top:1px solid var(--border); }
    .composer-wrap { display:flex; align-items:flex-end; gap:8px; padding:8px 10px; background:var(--bg); border:1px solid var(--border); border-radius:14px; }
    .composer-wrap:focus-within { border-color:var(--accent); background:var(--surface); }
    .composer-wrap textarea { flex:1; border:none; background:transparent; resize:none; font-size:0.88rem; color:var(--text); outline:none; max-height:140px; min-height:24px; padding:4px 0; line-height:1.4; }
    .composer-btn { background:transparent; border:none; padding:6px; display:grid; place-items:center; color:var(--muted); border-radius:8px; cursor:pointer; }
    .composer-btn:hover { background:var(--surface); color:var(--accent-strong); }
    .composer-btn.send { background:linear-gradient(135deg,var(--accent),var(--accent-strong)); color:#fff; width:36px; height:36px; border-radius:10px; }
    .composer-btn.send:hover { background:var(--accent-strong); color:#fff; }
    .composer-btn svg { width:16px; height:16px; }

    @media (max-width:900px) {
      .app-shell { grid-template-columns:1fr; }
      .sidebar { position:static; height:auto; }
      .main { padding:22px; }
      .detail-card { position:static; max-height:none; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l4 6-10 12L2 9z"/><path d="M11 3 8 9l4 12 4-12-3-6"/><path d="M2 9h20"/></svg>
        </div>
        <div class="brand-name">Diamantes</div>
      </div>
      <nav class="nav">
        <a href="dashboard.html" class="nav-item">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Início
        </a>
        <a href="demandas.html" class="nav-item active">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Demandas
        </a>
        <a href="perfil.html" class="nav-item">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Meu perfil
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-pill">
          <div class="avatar" id="navAvatar">OP</div>
          <div>
            <div class="user-pill-name" id="navName">Operador</div>
            <div class="user-pill-role">Operador</div>
          </div>
        </div>
        <button class="logout-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sair
        </button>
      </div>
    </aside>

    <main class="main">
      <div class="page-head">
        <div>
          <h1>Minhas demandas</h1>
          <p class="sub">Demandas atribuídas a você. Selecione uma para conversar com o aluno.</p>
        </div>
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="searchInput" placeholder="Buscar por aluno ou título..." />
        </div>
      </div>

      <div class="status-tabs" id="statusTabs"></div>

      <div class="work-area">
        <section class="list-card" id="listCard"></section>

        <aside class="detail-card">
          <div class="detail-head" id="detailHead"></div>
          <div class="detail-body" id="detailBody"></div>
          <div class="chat-scroll" id="chatScroll"></div>
          <div class="chat-composer">
            <div class="composer-wrap" id="composerWrap">
              <button class="composer-btn" id="attachBtn" title="Anexar arquivo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              </button>
              <textarea id="composer" placeholder="Escreva uma mensagem para o aluno..." rows="1"></textarea>
              <button class="composer-btn send" id="sendBtn" title="Enviar (Enter)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js" integrity="sha384-2zrRDgDHSYB/GN3nFW3fsZXoxEhKIr3N2h63Tc6DEOB9JJdFIu8xMJT2Cph/gBil" crossorigin="anonymous"></script>
  <script src="../assets/js/supabase-config.js"></script>
  <script src="../assets/js/demand-chat-api.js?v=20260512c"></script>
  <script src="../assets/js/chat-composer.js?v=20260512c"></script>
  <script src="assets/operator-api.js?v=20260512d"></script>
  <script src="assets/demandas.js?v=20260512d"></script>
</body>
</html>
